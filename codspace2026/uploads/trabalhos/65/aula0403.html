<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        .paralax{
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1686715018049-f73970aa97d3?");
            background-attachment: fixed;
            background-position: center;
            background-repeat:no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
        }

        .content {
            padding: 100px;
            background-color: rgb(0, 0, 0);
            color: white;
            text-align: center;
        }

        .paralax2 {
              height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1770096171587-5a8c78f05571?");
            background-attachment: fixed;
            background-position: center;
            background-repeat:no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
        }
    </style>
</head>
<body>
   <section class="paralax">
    <h1>Ford apresenta</h1>
   </section>

   <section class="content">
    <h2>Seção normal</h2>
    Aqui vai o conteudo do site. Quando você rolar a pagina a imagem do fundo vai ficar fixa criado
    o efeito
    paralax.</p>
   </section>

   <section class="paralax2">
    <h1>Raptor um carro para as suas aventuras</h1>
   </section>
</body>
</html>
