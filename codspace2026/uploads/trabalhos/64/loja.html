<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Tênis</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
}

header {
    background-color: black;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.banner {
    background-color: #ddd;
    padding: 40px;
    text-align: center;
}

.produtos {
    padding: 20px;
    text-align: center;
}

.card {
    background-color: white;
    padding: 15px;
    margin: 15px;
    display: inline-block;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 20px 40px rgb(34, 16, 108);
}

.card img {
    width: 100%;
}

button {
    background-color: black;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #444;
}

footer {
    background-color: black;
    color: white;
    text-align: center;
    padding: 10px;
}
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>👟 Fernandes Tenis </h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Os melhores tênis com os melhores preços!</h2>
    </section>

    <section class="produtos">
        <h2>Produtos</h2>

        <div class="card">
            <img src="https://i.pinimg.com/736x/f9/36/85/f93685b971c3805d4e97b458eab54cae.jpg" alt="">
            <h3>Nike Tn</h3>
            <p>R$ 399,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/736x/53/97/9f/53979f71affc3910264d1ffc779e9a28.jpg" alt="">
            <h3>Adidas</h3>
            <p>R$ 299,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/736x/6e/bd/1f/6ebd1f5848d8d00449db891d34656ff5.jpg" alt="">
            <h3>Puma</h3>
            <p>R$ 249,90</p>
            <button>Comprar</button>
        </div>
        <div class="card">
            <img src="https://i.pinimg.com/736x/8a/c2/59/8ac259c88e9f966f5c6249f58ccbc339.jpg" alt="">
            <h3>tesla</h3>
            <p>R$ 480,90</p>
            <button>Comprar</button>
        </div>
        <div class="card">
            <img src="https://i.pinimg.com/736x/2d/c1/82/2dc18285db8e59c5ed1e4fd1edd824b5.jpg" alt="">
            <h3>Vans</h3>
            <p>R$ 210,15 </p>
            <button>Comprar</button>
        </div>        

    </section>

    <footer>
        <p>© 2026 Loja de Tênis - Todos os direitos reservados</p>
    </footer>

</body>
</html>
