<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            height: 50px;
            padding: 10px;
            color: white;
            position: fixed;
        }

        #inicio {
            background-image: url("https://images.unsplash.com/photo-1511125357779-27038c647d9d?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            height: 100vh;
            background-size: cover;
            background-position: center;
            color: white;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: top;
            font-size: 6rem;
        }

        #meio {
            background: #f4f4f4;
            height: 100vh;
        }   

        #final {
            background: #ddd;
            height: 100vh;
        }
    </style>
</head>

<body>

    <header>
        <h2>LOGO</h2>
    </header>

    <section id="inicio">
        <h2>FUSKINHA</h2>
    </section>

    <section id="meio">
        <h2>Meio</h2>
    </section>

    <section id="final">
        <h2>Final</h2>
    </section>

</body>

</html>
