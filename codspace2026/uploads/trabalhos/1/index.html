<html lang="pt-br">

<head>

        .vermelha {

        }

        .papai {
            border: 1px solid black;
            display: flex;
            justify-content: space-around;
        }

        .mamae div{
            width: 40px;
            height: 40px;
            background: yellow;
        }

</head>

<body>

    <h3>Meus Trabalhos</h3>

    <div class="papai">
        <div class="vermelha">
            <p>Div</p>
        </div>
        <div class="azul">
            <p>Outra div</p>
        </div>
        <div class="roxa">
            <p>roxa</p>
        </div>
    </div>

    <div class="mamae">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>

</html>
