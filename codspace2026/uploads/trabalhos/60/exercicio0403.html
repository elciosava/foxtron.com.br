<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        header{
            height: 50px;
            padding: 10px;
            position: fixed;
            width: 100%;

        }
        #inicio{
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1772339164384-e4eba87f08c0");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(0, 0, 0);
            font-size: 5rem;
        }
        #meio,#final{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: solid 1px black;
        }
    </style>
</head>
<body>
    <header>
        <h2>logo</h2>
    </header>
    <section id="inicio">
        <h2>Inicio</h2>
    </section>
    <section id="meio">
        <h2>Meio</h2>
    </section>
    <section id="final">
        <h2>final</h2>
    </section>
</body>
</html>
