<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        .paralax {
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1772377764367-9c3e8e2ad560");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
        }
        .content {
            padding: 100px;
            background: #111;
            color: white;
            text-align: center;
        }
        .paralax2 {
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1772339164384-e4eba87f08c0");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <section class="paralax">
        <h1>Ian Weirich</h1>
    </section>

    <section class="content">
        <h2>Seção normal</h2>
        <p>Aqui vai o conteudo do site. Quando você rolar a pagina 
        a imagem do fundo vai fica fixa criando o efeito paralax</p>
    </section>

    <section class="paralax2">
        <h1>Trocou a imagem</h1>
    </section>
    
</body>
</html>
