<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .paralax{
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1762028161207-571ff725ebdd");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: slateblue;
            font-size: 3rem;
        }

        .content{
            padding: 100px;
            background: #1709e0;
            color: blanchedalmond;
            text-align: center;
        }

        .paralax2 {
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1512424113276-fa9f6a112384");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: slateblue;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <section class="paralax">
        <h1>Fusca bem maneiro</h1>
    </section>

    <section class="content">
        <h2>Seção Normal</h2>
            <p>Aqui vai o conteúdo do site. Quando tu rolar a página,
            a imagem do fundo vai continuar fixa criando o efeito
            paralax.</p>
    </section>

    <section class="paralax2">
        <h1>Construnção do tempo do Fusca</h1>
    </section>
</body>
</html>
