<!DOCTYPE html>
<html lang="pt-'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excercício Parallax</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        header{
            height: 50px;
            padding: 10px;
            position: fixed;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #inicio{
            background-image: url("https://images.unsplash.com/photo-1771030666262-093e276dbdcd");
            height: 100vh;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: blueviolet;
            font-size: 3rem;
        }
        #meio, #final {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: solid 1px palevioletred;
        }
    </style>
</head>
<body>
    <header>
        <h2>Capivara Bagual</h2>
    </header>

    <section id="inicio">
        <h2>Inicio</h2>
    </section>

    <section id="meio">
        <h2>Meio</h2>
    </section>

    <section id="final">
        <h2>Final</h2>
    </section>
</body>
</html>
