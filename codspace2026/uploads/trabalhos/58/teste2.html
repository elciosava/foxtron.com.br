<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste bem testado</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .paralax{
            height: 100vh;
            background-image: url("arabe.png");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: slateblue;
            font-size: 3rem;
        }

        .content{
            padding: 100px;
            background: #1709e0;
            color: blanchedalmond;
            text-align: center;
        }

        .paralax2 {
            height: 100vh;
            background-image: url("activia.png");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: slateblue;
            font-size: 3rem;
        }
    </style>
</head>
<body>

    <section class="paralax">
        <h1></h1>
    </section>

    <section class="content">
        <h2>Transição</h2>
        <p>Um siri fazendo barra</p>
            
    </section>

    <section class="paralax2">
        <h1></h1>
    </section>

</body>
</html>
