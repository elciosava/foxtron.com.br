<!DOCTYPE html>
<html lang="pt-br">

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header {
            background: #4b4b4b;
            height: 50px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0px 10px 10px #282728;

        }

        section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 60px);
            padding: 20px;

        }

        .coluna {
            box-shadow: 0px 1px 20px #0a0a0a;
            border-radius: 10px;
        }

        .menu {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        ul {
            display: flex;
            margin-left: 20px;
        }

        li {
            list-style: none;
            margin-left: 20px;
        }

        .img {
            height: 200px;
            background: linear-gradient(to bottom, rgb(22, 23, 24), rgb(91, 6, 166));
        }
        .texto{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: space-around;
            height: 120px;
            padding: 20px;
        }
        h3,p {
            padding: 8px 0;
        }
        .quadrinhos {
            border-top: 1px solid gray;
            border-bottom: 1px solid rgb(34, 33, 33);
            height: 90px;
            margin: 0 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .h{
            border-radius: 15px;
            width: 50px;
            height: 30px;
            border: solid 1px #0a0a0a;
        }
        
        
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
