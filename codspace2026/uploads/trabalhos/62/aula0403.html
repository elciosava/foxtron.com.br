<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
           margin: 0;
           padding: 0;
           box-sizing: border-box;
           font-family: 'Segoe UI', sans-serif;
        }
        .paralax{
            height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1649176061931-32deb5b9ca8f?q=80&w=1923&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;

        }
        .content {
            padding: 100px;
            background: #111;
            color: white;
            text-align: center;
        }
        .paralax2 {
         height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1735053142159-cd5ff3b9a423?q=80&w=1749&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;

        }

    </style>
</head>
<body>
    <section class="paralax">
       <h1>PARALAX</h1>
    </section>

    <section class="content">
        <h2>Aproveite o meu site</h2>
       <P> esse site e liberado para todas as idades, 
        aproveite bem o
        paralax.</P>
    </section>

    <section class="paralax2">
         <h1>2026</h1>
    </section>
</body>
</html>
