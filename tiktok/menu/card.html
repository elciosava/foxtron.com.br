<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f1224;
            height: 70vh;
            display: grid;
            place-items: center;
        }

        .menu {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 0;
            display: flex;
            gap: 12px;
            backdrop-filter: blur(6px);
        }

        .menu a {
            text-decoration: none;
            color: #e9ecff;
            font-weight: 700;
            padding: 12px 18px;
            border-radius: 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            transition: transform 0.18s ease,
                        box-shadow 0.18s ease,
                        background 0.18s ease;
        }

        .menu a:hover{
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 14px 30px rgba(0,0,0,0.35);
        }

        .menu a:hover {
            border-color: rgba(255, 255, 255, 0.20);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5eead4;
            box-shadow: 0 0 18px rgba(94,234,212,0.55);
            flex: 0 0 10px;
        }
    </style>
</head>
<body>
    <nav class="menu">
        <a href="#"><span class="dot"></span>Inicio</a>
        <a href="#"><span class="dot"></span>Cursos</a>
        <a href="#"><span class="dot"></span>Projetos</a>
        <a href="#"><span class="dot"></span>Contato</a>
    </nav>
</body>
</html>
