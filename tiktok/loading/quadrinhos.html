<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            --bg-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-color);
        }

        .loader {
            --cell-size: 52px;
            --cell-spacing: 1px;
            --cells: 3;
            --total-size: calc(var(--cells) 
                * (var(--cell-size) 
                + 2 * var(--cell-spacing)));
            --bg-color: transparent;
            display: flex;
            flex-wrap: wrap;
            width: var(--total-size);
            height: var(--total-size);
        }

        .cell {
            flex: 0 0 var(--cell-size);
            margin: var(--cell-spacing);
            background-color: var(--bg-color);
            box-sizing: border-box;
            border-radius: 4px;
            animation: 1.5s ripple ease infinite;
        }

        .cell.d-1 {
            animation-delay: 100ms;
        }

        .cell.d-2 {
            animation-delay: 200ms;
        }

        .cell.d-3 {
            animation-delay: 300ms;
        }

        .cell.d-4 {
            animation-delay: 400ms;
        }

        .cell:nth-child(1) {
            --cell-color: #00ff87;
        }

        .cell:nth-child(2) {
            --cell-color: #0cfd95;
        }

        .cell:nth-child(3) {
            --cell-color: #17fba2;
        }

        .cell:nth-child(4) {
            --cell-color: #23f9b2;
        }

        .cell:nth-child(5) {
            --cell-color: #30f7c3;
        }

        .cell:nth-child(6) {
            --cell-color: #3df5d4;
        }

        .cell:nth-child(7) {
            --cell-color: #45f4de;
        }

        .cell:nth-child(8) {
            --cell-color: #53f1f0;
        }

        .cell:nth-child(9) {
            --cell-color: #60efff;
        }

        @keyframes ripple {
            0% {
                background-color: transparent;
            }

            30% {
                background-color: var(--cell-color);
            }

            60% {
                background-color: transparent;
            }

            100% {
                background-color: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="cell d-0"></div>
        <div class="cell d-1"></div>
        <div class="cell d-2"></div>

        <div class="cell d-1"></div>
        <div class="cell d-2"></div>

        <div class="cell d-2"></div>
        <div class="cell d-3"></div>

        <div class="cell d-3"></div>
        <div class="cell d-4"></div>
    </div>
</body>
</html>
