<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            overflow: hidden;
            background: #e3f2fd;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .truck {
            position: relative;
            width: 250px;
            height: 140px;
            transform: scaleX(-1);
        }

        /* Cabine */
        .cab {
            position: absolute;
            left: 0;
            bottom: 40px;
            width: 80px;
            height: 60px;
            background: #1e88e5;
            border-radius: 10px 0 0 5px;
        }

        /* Janela */
        .window {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 40px;
            height: 25px;
            background: #bbdefb;
            border-radius: 5px;
        }

        /* Baú (mais alto e menor) */
        .cargo {
            position: absolute;
            left: 80px;
            bottom: 40px;
            width: 160px;
            height: 85px;
            background: #b0bec5;
            border-radius: 5px 5px 5px 0;
        }

        /* Rodas */
        .wheels {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 220px;
            display: flex;
            justify-content: space-between;
        }

        .wheel {
            width: 34px;
            height: 34px;
            background: #212121;
            border-radius: 50%;
            border: 4px solid #555;
            animation: spin 0.8s linear infinite;
        }

        /* Animação andando */
        @keyframes moveTruck {
            from {
                left: -300px;
            }

            to {
                left: 110%;
            }
        }

        /* Rodas girando */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="truck">
        <div class="cab">
            <div class="window"></div>
        </div>

        <div class="cargo"></div>

        <div class="wheels">
            <div class="wheel"></div>
            <div class="wheel"></div>
        </div>
    </div>

</body>

</html>
