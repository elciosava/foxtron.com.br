<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }
        div {
            border: 10px solid black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .d7 {
            width: 10px;
            height: 10px;
        }
        .d6 {
            width: 30px;
            height: 30px;
            border-top-color: red;
            border-bottom-color: red;
        }
        .d5 {
            width: 50px;
            height: 50px;
            border-left-color: red;
            border-right-color: red;
        }
        .d4 {
            height: 70px;
            width: 70px;
            border-top-color: red;
            border-bottom-color: red;
        }
        .d3 {
            width: 90px;
            height: 90px;
            border-left-color: red;
            border-right-color: red;
        }
        .d2 {
            width: 110px;
            height: 110px;
            border-top-color: red;
            border-bottom-color: red;
        }
        .d1 {
            width: 130px;
            height: 130px;
            border-left-color: red;
            border-right-color: red;
        }
    </style>
</head>
<body>
    <div class="d1">
        <div class="d2">
            <div class="d3">
                <div class="d4">
                    <div class="d5">
                        <div class="d6">
                            <div class="d7">

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
