<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastrar Usuário - ReUse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>♻️ ReUse</h1>
  <nav>
    <a href="index.html">Início</a>
    <a href="cadastrar.html">Cadastrar Item</a>
    <a href="buscar.html">Buscar</a>
    <a href="cadastro_usuario.html" class="ativo">Cadastrar Usuário</a>
    <a href="login.html">Entrar</a>
  </nav>
  <button id="modo-btn">🌙</button>
</header>

<section class="formulario">
  <h2>Criar Conta</h2>

  <form id="form-user">
    <label>Nome</label>
    <input type="text" id="user-nome" placeholder="Seu nome" required>

    <label>Sobrenome</label>
    <input type="text" id="user-sobrenome" placeholder="Seu sobrenome" required>

    <label>Email</label>
    <input type="email" id="user-email" placeholder="seuemail@gmail.com" required>

    <label>Senha</label>
    <input type="password" id="user-senha" placeholder="********" required>

    <label>Confirmar Senha</label>
    <input type="password" id="user-senha2" placeholder="********" required>

    <label>Endereço</label>
    <input type="text" id="user-endereco" placeholder="Rua, número, bairro..." required>

    <button type="submit" class="btn">Criar Conta</button>
  </form>

  <p style="margin-top:15px; text-align:center;">
    Já tem conta? <a href="login.html" style="color:var(--accent);">Entrar</a>
  </p>
</section>

<footer>
  <p>🌍 ReUse — Reduza, Reutilize, Recicle.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
