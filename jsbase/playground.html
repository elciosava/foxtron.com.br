<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - JSBase</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .playground-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      height: calc(100vh - 120px);
      padding: 1rem;
    }

    .playground-panel {
      display: flex;
      flex-direction: column;
      background-color: #1a1a1a;
      border: 1px solid #3E3E42;
      border-radius: 6px;
      overflow: hidden;
    }

    .playground-panel-header {
      background-color: rgba(79, 193, 255, 0.1);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #3E3E42;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
      color: #4FC1FF;
      font-weight: 600;
    }

    .playground-panel-content {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      background-color: #1E1E1E;
      color: #D4D4D4;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
      padding: 1rem;
      resize: none;
      outline: none;
    }

    #output {
      flex: 1;
      background-color: #1E1E1E;
      color: #D4D4D4;
      padding: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
      overflow-y: auto;
      line-height: 1.6;
    }

    .output-line {
      margin-bottom: 0.5rem;
    }

    .output-error {
      color: #F48771;
    }

    .output-success {
      color: #6A9955;
    }

    .output-input {
      color: #4FC1FF;
    }

    .playground-controls {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid #3E3E42;
      background-color: #121212;
    }

    .playground-controls button {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
    }

    .tabs-container {
      display: flex;
      border-bottom: 1px solid #3E3E42;
      background-color: #121212;
    }

    .tab-button {
      flex: 1;
      padding: 0.75rem;
      background-color: transparent;
      color: #858585;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
      transition: all 200ms ease-out;
      border-bottom: 2px solid transparent;
    }

    .tab-button:hover {
      color: #D4D4D4;
    }

    .tab-button.active {
      color: #4FC1FF;
      border-bottom-color: #4FC1FF;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow: auto;
    }

    .tab-content.active {
      display: block;
    }

    @media (max-width: 768px) {
      .playground-container {
        grid-template-columns: 1fr;
        height: auto;
      }

      .playground-panel {
        height: 400px;
      }
    }

    .input-prompt {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
    }

    .input-prompt input {
      flex: 1;
      background-color: #2D2D30;
      color: #D4D4D4;
      border: 1px solid #3E3E42;
      padding: 0.25rem 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
    }

    .input-prompt input:focus {
      outline: none;
      border-color: #4FC1FF;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-content">
      <div class="logo">
        <img src="/manus-storage/jsbase-logo_efa969d3.png" alt="JSBase Logo">
        <span>JSBase</span>
      </div>
      <nav>
        <a href="index.html">Início</a>
        <a href="playground.html">Playground</a>
        <a href="docs/index.html">Documentação</a>
      </nav>
    </div>
  </header>

  <!-- Playground Container -->
  <div class="playground-container">
    <!-- Editor Panel -->
    <div class="playground-panel">
      <div class="playground-panel-header">📝 Editor JSBase</div>
      <textarea id="editor" placeholder="Digite seu código JSBase aqui...

Exemplo:
numero idade recebe 18

se idade maior ou igual 18
  mostrar &quot;Maior de idade&quot;
senao
  mostrar &quot;Menor de idade&quot;
fimse"></textarea>
      <div class="playground-controls">
        <button class="btn btn-primary" onclick="executarCodigo()">▶ Executar</button>
        <button class="btn btn-secondary" onclick="limparEditor()">🗑️ Limpar</button>
        <button class="btn btn-secondary" onclick="carregarExemplo('hello')">📚 Exemplo 1</button>
        <button class="btn btn-secondary" onclick="carregarExemplo('tabuada')">📚 Exemplo 2</button>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="playground-panel">
      <div class="tabs-container">
        <button class="tab-button active" onclick="mudarAba('output')">Saída</button>
        <button class="tab-button" onclick="mudarAba('transpilado')">JavaScript Gerado</button>
      </div>

      <div id="output" class="tab-content active"></div>
      <div id="transpilado" class="tab-content" style="padding: 1rem; overflow-y: auto;"></div>
    </div>
  </div>

  <script src="js/compiler.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');
    const transpilado = document.getElementById('transpilado');
    let compiler = new JSBaseCompiler();

    const exemplos = {
      hello: `mostrar "Olá Mundo!"`,
      tabuada: `funcao tabuada(numero n)
  para (numero i recebe 1; i menor ou igual 10; i recebe i+1)
    mostrar n, "x", i, "=", n * i
  fimpara
fimfuncao

tabuada(7)`,
      parouimpar: `funcao ehPar(numero n)
  se n % 2 igual 0
    retornar verdadeiro
  senao
    retornar falso
  fimse
fimfuncao

numero num recebe 42
se ehPar(num)
  mostrar num, "é par"
senao
  mostrar num, "é ímpar"
fimse`
    };

    function carregarExemplo(nome) {
      if (exemplos[nome]) {
        editor.value = exemplos[nome];
        executarCodigo();
      }
    }

    function limparEditor() {
      editor.value = '';
      output.innerHTML = '';
      transpilado.innerHTML = '';
    }

    function mudarAba(aba) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      
      document.getElementById(aba).classList.add('active');
      event.target.classList.add('active');
    }

    function executarCodigo() {
      output.innerHTML = '';
      transpilado.innerHTML = '';

      const codigo = editor.value.trim();
      if (!codigo) {
        const msg = document.createElement('div');
        msg.className = 'output-line output-success';
        msg.textContent = '💡 Digite algum código JSBase para executar...';
        output.appendChild(msg);
        return;
      }

      try {
        // Compilar
        compiler = new JSBaseCompiler();
        const codigoJS = compiler.compile(codigo);

        // Mostrar código transpilado
        transpilado.textContent = codigoJS;

        // Executar
        const originalLog = console.log;
        console.log = function(...args) {
          const linha = document.createElement('div');
          linha.className = 'output-line';
          linha.textContent = args.map(a => 
            typeof a === 'object' ? JSON.stringify(a) : String(a)
          ).join(' ');
          output.appendChild(linha);
        };

        eval(codigoJS);
        console.log = originalLog;

      } catch (erro) {
        const linhaErro = document.createElement('div');
        linhaErro.className = 'output-line output-error';
        linhaErro.textContent = '❌ Erro: ' + erro.message;
        output.appendChild(linhaErro);
      }
    }

    // Carregar exemplo da URL se existir
    const params = new URLSearchParams(window.location.search);
    if (params.has('example')) {
      carregarExemplo(params.get('example'));
    }

    // Atualizar transpilação em tempo real
    editor.addEventListener('input', function() {
      try {
        compiler = new JSBaseCompiler();
        const codigoJS = compiler.compile(editor.value);
        transpilado.textContent = codigoJS;
      } catch (erro) {
        transpilado.textContent = '// Erro na transpilação:\n// ' + erro.message;
      }
    });
  </script>
</body>
</html>
