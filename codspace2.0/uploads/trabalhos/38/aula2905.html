<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }

      body {
        background-color: pink;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        height: 40px;
        background-color: pink;
      }

      ul{
        display: flex;
        justify-content: center;
        align-items: center;
        list-style: none;
      }

      li {
        margin-left: 20px;

      }

      #container {
        display: grid;
        grid-template-columns:  1fr 1fr;
        gap: 30px;
        height: calc(100vh - 130px);
        padding: 20px;
      }

      .div1 {
        grid-row: span 2;
        background-image: url("photo-1777026059641-53bcbd04f194.avif");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: -100px;

      }

      .div2 {
        background-image: url("liana-s-5Gkw57uHQ6s-unsplash.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: -100px;
      }

    .div3 {
        background-image: url("alim-dK7bd14-6JI-unsplash.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: -100px;

    }

    .linha {
        background: rgb(231, 164, 231);
    }
      
    </style>
    
</head>
<body>
    <header>
       <img src="alt" alt="logo">
       <nav>
        <ul>
            <li>INICIO</li>
            <li>SOBRE</li>
            <li>SERVIÇOS</li>
            <li>CONTATO</li>
        </ul>
       </nav>
    </header>

    <div id="container">
    <div class="div1">
        
    </div>
    <div class="div2">
        
    </div>
    <div class="div3">
       
      </div>     
   </div>
</body>

</html>
