<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
           box-sizing: border-box;
           font-family: sans-serif;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background-color: rgb(199, 126, 228);
            
        }

        header img {
            width: 50px;
        }

        body {
            background-color: rgb(250, 180, 250);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            background-color: rgb(235, 173, 243);
            height: calc(100vh - 80px);
            grid-template-areas: 
                "menu banner"
                "menu albuns"
                "player player";
                grid-template-rows: 280px 1fr 80px;
                margin-top: 10px;

        }

        .menu {
            grid-area: menu;
            background: rgb(255, 163, 250);
            padding: 20px;
        }

        .banner {
          grid-area: banner;
          background: plum;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 30px;
          font-weight: bold;
        }

        .banner img {
            width: 100%;
            height: 240px;
            object-fit: cover;

        }
        

        .albuns {
         grid-area: albuns;
         background: rgb(250, 159, 227);
         padding: 20px;
         display: grid;
         grid-template-columns: repeat(6, 1fr);
         gap: 20px;
        }

        .player {
           grid-area: player;
           background: rgb(245, 170, 232);
           display: flex;
           align-items: center;
           justify-content: center;
        }

        .album {
            background: rgb(230, 224, 226);
            border-radius: 5px;
            height: 200px;
            transition: 0, 3s;
        }
    </style>
</head>
<body>
    <header>
        <img src="paw-solid-full.svg" alt="Logo_do_site">
        <input type="search" name="buscar" id="">
        <span>Talita Lima</span>
    </header>
    <div id="container">
        <div class="menu">
            Menu
        </div>
        <div class="banner">
            <img src="163403738-inscrição-música-dj-cartaz-abstrato-banner-fundo-abstrato-textura-fluidposter-vetor.jpg" alt="">
        </div>
        <div class="albuns">
         <div class="album"></div>
         <div class="album"></div>
         <div class="album"></div>
         <div class="album"></div>
         <div class="album"></div>
         <div class="album"></div>
        </div>
        <div class="player">
            <audio src="AUD-20200525-WA0032.mp3" controls></audio>
        </div>
    </div>
</body>
</html>
