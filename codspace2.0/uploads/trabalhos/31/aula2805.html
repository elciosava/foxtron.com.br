<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body{
            background: #00af00;
        }
        header{
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background: #00af00;
        }
        #container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 350px 1fr 80px;
            margin-top: 10px;
        }
        .menu{
            grid-area: menu;
            background: #23d613;
            padding: 20px;
        }
        .banner{
            grid-area:banner;
            background: #23d613;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .albuns{
            grid-area: albuns;
            background: #23d613;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }
        .album{
            background:#00af00;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }
        .player{
            grid-area: player;
            background: #23d613;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header img {
            width: 50px;
        }
    </style>
</head>
<body>
    <header>
        <img src="shield-dog-solid-full .svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>Ariel Franco</span>
    </header>
    <div id="container">
        <div class="menu">
            Menu
        </div>
        <div class="banner">
            <img src="https://i.ytimg.com/vi/mcIo5T_xIv8/maxresdefault.jpg" alt="">
        </div>
        <div class="albuns">
            <div class="album">Marcus Salles</div>
            <div class="album">Fernandinho</div>
            <div class="album">Morada</div>
            <div class="album">Isaias Saad</div>
            <div class="album">Discopraise</div>
            <div class="album">Gabriela Rocha</div>
        </div>
        <div class="player">
           <audio src="AUD-20230911-WA0037.mp3" controls></audio>
        </div>
    </div>
</body>
</html>
