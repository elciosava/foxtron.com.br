<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .card {
            background: green;
        }
       .posicao{
        display: flex;
        justify-content: center;
        align-items:center;
       }
        #container {
            display:grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            grid-template-rows: calc(100vh - 70px);
        }
        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
        }
        ul {
           display: flex;
        }
        li{
            display: flex;
           list-style: none;
           padding: 10px;
           justify-content: center;
        }
        form{
            background: greenyellow;
            width: 300px;
            padding: 15px;
        }
        input{
            width: 100%;
        }
        
    </style>
</head>
<body>
    <header>
        <h2>Display Grid</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card posicao">
        <div class="card">
            <form action="" method="get">

                <label for="Nome">Nome:</label>
                <input type="text" name="Nome" id="">

                <label for="Email">Email:</label>
                <input type="text" name="Email" id="">

                <label for="CPF">CPF:</label>
                <input type="text" name="CPF" id="">

                <label for="Data de nascimento">Data de nascimento:</label>
                <input type="date" name="Data de nascimento" id="">

                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

</body>
</html>
