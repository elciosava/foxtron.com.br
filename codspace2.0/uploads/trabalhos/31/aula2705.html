<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI';
            color: green;
        }
        
        
        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
        }
        ul {
           display: flex;
        }
        li{
            display: flex;
           list-style: none;
           padding: 10px;
           justify-content: center;
        }

        #inicio{
            display: flex;
            justify-content:space-evenly;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin-top: -80px;
            padding-top: 10px;
            background: lightseagreen;
            background-image: url(https://images.unsplash.com/photo-1670884307164-a652a34f23da?q=80&w=1528&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-repeat: no-repeat;
            background-size:100%;
        }
        .logo, .texto{
            padding: 50px;
            text-align: center;
        }
        h1{
            font-size: 5rem;
            letter-spacing: 10px;
        }
        p{
            letter-spacing: 1px;
            font-size: 1.2rem;
        }
        
    </style>
</head>
<body>
    <header>
      <nav>
        <ul>
            <li>Home</li>
            <li>Sobre</li>
            <li>Contato</li>
        </ul>
      </nav>
    </header>
    <section id="inicio">
        <div class="logo">

            <h1>Buracos Negros</h1>

        </div>
        <div id="texto">

            <p>Os buracos negros possuem massa infinita</p>
            <p>eles são tão fortes que nem a luz escapa.</p>

        </div>
    </section>
    
</body>
</html>
