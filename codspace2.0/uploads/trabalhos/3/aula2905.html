<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 600;
        }
        header {

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;

        }
        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            
        }
        li {
            margin-left: 40px;
        } 

        #container {

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;

        }
            header {
            width: 80px;
        }
        .div1 {

            grid-row: span 2;
            background-image: url(https://images.unsplash.com/photo-1779202568356-a8239fd66d86?q=80&w=725&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-size: cover;
            background-repeat: no-repeat;
        }
        .div2 {
           
            background-image: url(https://images.unsplash.com/photo-1778147356071-c8f5a7287ea6?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-size: cover;
            background-repeat: no-repeat;

        }
        .div3 {
           
            background-image: url(https://images.unsplash.com/photo-1778147356071-c8f5a7287ea6?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-size: cover;
            background-repeat: no-repeat;
        }
        
        .linha {
            background: lightsalmon;

        }
        
        
    </style> 
</head>

<body>
    <header>
        <img src="dog-solid-full.svg" alt="logo">
        <nav>
            <ul>
                <li>Inicio</li>
                <li>Sobre</li>
                <li>Seviços</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>
    <div id="container">

        <div class="div1">
           
        </div>
        <div class="div2">
            
        </div>
        <div class="div3">
            
        </div>
            
           
    </div>
</body>
</html>
