<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2705</title>

    <Style>
        
     
     * {
        margin: 0;
        padding: 0;
        
       }
       form{
        padding: 15px;
        width: 300px;

       }
       input{
        width: 100%;
       }

       .container {
            display: grid;
            grid-template-columns: 1fr 2fr 3fr;
            gap: 10px;
            grid-template-rows: calc(100vh - 70px);
     }
     .coluna {
        background: lightsalmon;
      }
      head {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50px;
        padding: 10px;

      }
    li{
        margin: 5px;
        list-style: none;

    }

    .posicao{
        padding: 10px;

    }
    .menu{
        background: violet;
    }
    header{
        height: 70px;

 }
    </Style>  
    
</head>
<body>
    <header>
        <h2>Cabeçario</h2>
        
        
        
    </header>
    

<div class="container">
    <div class="coluna">
        <nav>
            <ul>
            <li>Home</li>
            <li>Sobre</li>
            <li>Imagens</li>
            <li>Onde Estamos</li>
            </ul>
        </nav>
    </div>
    <div class="coluna">
        <form action="" method="get">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="">

            <label for="email">Email</label>
            <input type="text" name="email" id="">

            <label for="telefone">Nome</label>
            <input type="text" name="telefone" id="">


            <input type="text" name="nome" id="">
            <button type="submit"Enviar</button>
        </form>
    </div>


    <div class="coluna"></div>
</div>

</body>      

 </html>
