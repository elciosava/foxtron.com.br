<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE2705</title>

        <style>
         *{
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
   
         }
        
         header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
         }
         ul{ 
            display: flex;

         }
         li{
            margin: 5px;
            list-style: none;
         }
         #inicio {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin-top: -80px;
            padding-top: 10px;
            background: red;
            background-image: url("https://images.unsplash.com/photo-1779614026411-d326c9744e8c?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: 100%;
            background-repeat: no-repeat;
            
         }



         h2 {
            font-size: 5rem;
            letter-spacing: 10px;
         }
         .logo, .texto {
            padding: 50px;
            text-align: center;
         }

         p {
            letter-spacing: 1px;
            font-size: 1.2rem;
         }
        </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>
    <section id="inicio">
        <div class="logo">
            <h2>LEO</h2>
        </div>

        <div class="texto">
            <p>Meu site</p>
            <p>SITE TESTE</p>
        </div>       
    </section>  
</body>
</html>
