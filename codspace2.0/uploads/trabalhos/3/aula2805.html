<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Document</title>
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
       } 

       header {
        display: flex;
        height: 60px;
        padding: 10px;
        justify-content: space-around;
        align-items: center;
        background: #f7f799;
       }
       header img {
        width: 50px;
       }

       #container {
         display: grid;
         grid-template-columns: 1fr 3fr;
         gap: 10px;
         height: calc(100vh - 80px);
         grid-template-areas:
         "menu banner"
         "menu albuns"
         "player player";
         grid-template-rows: 280px 1fr 80px; 
         margin-top: 10px;
       }
       

         .menu {
         grid-area: menu;
         background-color:#5458d2;
         padding: 20px;

       }
         .banner {
           grid-area:banner;
           background: #5458d2;
           justify-content: center;
           font-size: 30px;
           font-weight: bold;
        } 

         .banner img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

         .albuns{
            grid-area: albuns;
            background: #5458d2;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6,1fr);
            gap: 20px;
        }
         .player{
            grid-area: player;
            background: #5458d2;
            display: flex;
            align-items: center;
         }

         .album {
            background: rgb(197, 202, 207);
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }    


       body{
        background: black;
        
       }

    </style>
</head>
<body>
    <header>
        <img src="dog-solid-full.svg"alt="Logo do Site">
        <input type="search" name="buscar" id="">
        <span>Leonardo Spanhol</span>

    </header>
    
    
    <div id="container">
        <div class="menu">Menu</div>
           
        <div class="banner">
            <img src="weston-m-3pCRW_JRKM8-unsplash.jpg" alt="">
        </div>
         
        
           
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
           
        <div class="player">
            <audio src="05-pinback-loro_-_www.file24ever.com.mp3" controls></audio>
        </div>
           
    </div>

</body>
</html>
