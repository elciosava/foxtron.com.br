<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding-top: 50px;
        }
        header {
            display: flex;
            height: 50px;
            padding: 10px;
            position: fixed;
            width: 100%;
            background-color: rgb(163, 255, 243);
            top: 0;
        }

        nav{
            display: flex;   
        }

        ul {
            display: flex;  
        }

        li {
            list-style: none;
            margin: 5px;
        }

        section{
            height: 100vh;
            scroll-margin-top: 50px;
        }  
        
        #artigo {
            display: flex;
        }

        #artigo {
            width: 600px;
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
   <header>
    <nav>
        <ul>
            <li><a href="#home">home</a></li>
            <li><a href="#artigo">artigo</a></li>
            <li><a href="#contato">contato</a></li>
        </ul>
    </nav>
   </header> 
   <section id="home">
        <h3>Home</h3>
   </section>

    <section id="artigo">
          <div class=""

        <h3>Artigo</h3>


     <p>
        a tag section no html e usada para fazer a divisao entre sessoes
        de um site, assim como usamos uma div para dividir e separar
        objetos e elementos dentro de um elemento pai podemos usar a 
        section como elemento pai de outros objetos.
     </p>

     <img src="section-html-tag (1).avif" alt="">

     </section>

    <section id="contato">
        <h3>Contato</h3>
    </section>
</body>
</html>
