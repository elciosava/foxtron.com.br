<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .container{
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            gap: 10px;
            grid-template-rows: calc(100vh - 70px);
        }

        .coluna{
            background: lightblue;
            align-items: center;
            justify-content: center;
            display: flex;
        }

        ul{
            display: flex;
        }

        li{
            display: flex;
            margin: 3px;
        }

        header{
            height: 70px;
        }

        li{
            list-style: none;
            padding: 5px;
        }

        form{
            width: 100%;
            padding: 20px;
            justify-content: center;
            display: flex;
        }

        input{
            width: 100%;
        }
        
    </style>
</head>
<body>
    <header>
        <h2>Cabeçalho</h2>
    </header>

    <div class="container">
        <div class="coluna">
            <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Imagens</li>
                <li>Onde estamos</li>
            </ul>
        </nav>
        </div>
        <div class="coluna">
             <form action="" method="get">
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="">

                <label for="email">Telefone:</label>
                <input type="text" name="email" id="">

                <label for="cpf">CPF:</label>
                <input type="text" name="cpf" id="">

                <button type="submit">Enviar</button>
            </form>
        </div>
        <div class="coluna"></div>
    </div>
</body>
</html>
