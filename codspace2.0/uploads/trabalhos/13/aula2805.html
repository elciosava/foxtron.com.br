<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;

        }

        body{
            background: #36130b;
        }

        header{
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background: #36130b;
            border-radius: 10px;
        }

        header img {
            width: 90px;
        }

        #container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
            background: #36130b;
        }

        .menu{
            grid-area: menu;
            background: #5e2d1a;
            padding: 20px;
            border-radius: 10px;
        }

        .banner{
            grid-area: banner;
            background: #c58b46;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            border-radius: 10px;
        }

        .banner img{
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 10px;
        }

        .albuns{
            grid-area: albuns;
            background: #c58b46;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            border-radius: 10px;
        }

        .player{
            grid-area: player;
            background: #36130b;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .album{
            background: #f3c877;
            border-radius: 10px;
            height: 175px;
            transition: 0,3s;
        }

        .album img{
            width: 175px;
            border-radius: 10px;
        }


    </style>
</head>
<body>
    <header>
        <img src="mix-brands-solid-full.svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>Breno</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="treble-clef-swirly-staff-musical-260nw-2270743301.webp" alt="">
        </div>
        <div class="albuns">
            <div class="album">            
                <img src="download.jpg" alt="">
            </div>
            <div class="album">
                <img src="downloadead.jpg" alt="">
            </div>
            <div class="album">
                <img src="musica.jpg" alt="">
            </div>
            <div class="album">
                <img src="musica2.jpg">
            </div>
            <div class="album">
                <img src="musica3.jpg" alt="">
            </div>
            <div class="album">
                <img src="musica4.jpg" alt="">
            </div>
            <div class="album">
                <img src="musica5.jpg" alt="">
            </div>
            <div class="album">
                <img src="musica6.jpg" alt="">
            </div>
        </div>
        <div class="player">
            <audio src="Lá Ele.mp3" controls></audio>
        </div>
    </div>
</body>
</html>
