<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
        }

        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;
        }
        header {
            width: 60px;
        }
        .div1 {
            grid-row: span 2;
            background-image: url("https://images.unsplash.com/photo-1778789172766-3787a3ad4f57?q=80&w=755&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: cover;
            background-repeat: no-repeat;
        }
        .div2 {
            background-image: url("https://images.unsplash.com/photo-1773332585754-f1436987743b?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
             background-size: cover;
            background-repeat: no-repeat;
        }
        .div3 {
            background-image: url("https://plus.unsplash.com/premium_photo-1661772661721-b16346fe5b0f?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
         background-size: cover;
            background-repeat: no-repeat;
        }
        .linha {
            background: lightcoral;
        }
    </style>

<body>
    <header>
        <img src="address-book-solid-full.svg" alt="logo">
        <nav>
            <ul>
                <li>INICIO</li>
                <li>SOBRE</li>
                <li>SERVIÇOS</li>
                <li>CONTATO</li>
            </ul>
        </nav>
    </header>
    <div id="container">

        <div class="div1">
            
            
        </div>
        <div class="div2">
            
        </div>
        <div class="div3">
            
        </div>

    </div>
</body>

</html>
