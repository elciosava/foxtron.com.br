<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            
            background: green;
        }
        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            grid-template-rows: 200px 200px;
        }
    </style>
</head>
<body>
    <header>
        <h2>Display Grid</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>
    <div id="container">
       <div class="card"></div>
       <div class="card"></div>
       <div class="card"></div>
       <div class="card"></div>
    </div>
</body>
</html>
