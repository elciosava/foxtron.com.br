<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .card {
            background-color: red;

        }

        .posicao {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            grid-template-rows: calc(100vh - 70px);
        }

        header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
        }

        ul {
            display: flex;
        }

        li {
            margin: 5px;
            list-style: none;
            align-items: center;
        }

        form {
            background-color: aqua;
            padding: 5px;
            width: 300px;
        }

        input {
            width: 100%;
            
        }
    </style>
</head>
<body>
    <header>
        <h2>Display Grid</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card posicao">
            <form action="" class="get">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="">

                <label for="email">Email</label>
                <input type="text" name="Email" id="">

                <label for="cpf">CPF</label>
                <input type="text" name="Cpf" id="">

                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

</body>
</html>
