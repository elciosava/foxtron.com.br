<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: black;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background-color: rgb(16, 36, 16);
        }

        header img {
            width: 50px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            background-color: rgb(0, 0, 0);
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }
        
        .menu {
            grid-area: menu;
            background: lightgreen;
            padding: 20px;
        }

        .banner {
            grid-area: banner;
            background: green;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img {
            width: 1430px;
            height: 280px;
            object-fit: cover;
        }

        .albuns {
            grid-area: albuns;
            background: darkgreen;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .player {
            grid-area: player;
            background: darkolivegreen;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album {
            background-color: aliceblue;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <header>
        <img src="dumbbell-solid-full (1).svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>joao guth</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="27e33cff4b73769e28c5e06f43d366f7.jpg" alt="">
        </div>
        <div class="albuns">
             <img src="download.jpg" alt="">
            <div class="album"></div>
           
            <div class="album"></div>
            
            <div class="album"></div>
            
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="09 Deftones - Rosemary.mp3"controls></audio>
        </div>
    </div>
</body>
</html>
