<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .card {
            background-color: rgb(196, 238, 43);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 5px;
            grid-template-rows: calc(100vh - 70px);
        }

        header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
        }


        ul {
            display: flex;
            
            
        }

        li {
            margin: 5px;
            list-style: none;

        }

        form {
            padding: 15px;
            width: 300px;
            background-color: rgb(209, 241, 165);
           
        }

        input {
            width: 100%;
        }

        .posicao {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <h2>display grid</h2>
        <nav>
            <ul>
                <li>home</li>
                <li>sobre</li>
                <li>contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card posicao">
            <form action="" method="get">
                <label for="nome">nome</label>
                <input type="text" name="nome" id="">

                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="">

                <label for="email">email</label>
                <input type="text" name="email" id="">

                <button type="submit">botao</button>
            </form>
        </div>
        
    </div>
</body>
</html>
