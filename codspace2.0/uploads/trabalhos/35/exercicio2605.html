<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        ul{
            display: flex;
        }
        li{
            list-style: none;
            margin: 5px;
        }
        .card {

            background: red;
        }

        .posicao{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            grid-template-rows: calc(100vh - 70px);

        }
        form{
            background: blue;
            padding: 15px;
            width: 300px;
        }
        input{
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <h2>Display Grid</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>sobre</li>
                <li>contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card posicao">

            <form action="" method="get">
                <label for="nome">mome</label>
                <input type="text" name="nome" id="">

                <label for="email">email</label>
                <imput type="text" name="email" id="">

                    <label for="cpf">CPF</label>
                    <input type="text" name="cpf" id="">

                   <butt type= "submit">Enviar </button>

            </form>
        </div>
    </div>

</body>

</html>
