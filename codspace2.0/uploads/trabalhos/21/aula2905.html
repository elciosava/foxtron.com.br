<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
            background: rgb(217, 177, 255);
        }

        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 10px;
        }
      
        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;
        }

        .div1 {
            grid-row: span 2;
            background-image: url(rita-ox-eH5gAM2X2wQ-unsplash.jpg);
            background-size: cover;
            background-repeat: no-repeat;
        }

        .div2 {
            background-image: url(sam-skyer-MGLYSMvPvVk-unsplash.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100px;
        }

        .div3 {
            background-image: url(arthur-rachbauer-vYyHLDPKWd4-unsplash.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100px;
        }

        .linha {
            background: rgb(239, 208, 255);
        }
    </style>
</head>
<body>
    <header>
        <img src="" alt="logo">
        <nav>
            <ul>
                <li>Inicio</li>
                <li>Sobre</li>
                <li>Serviços</li>
                <li>contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="div1">
            <p>Div 1</p>
            <p>ocupa duas linhas</p>
        </div>
        <div class="div2">
            <p>Div 2</p>
            <p>Primeira linha</p>
        </div>
        <div class="div3">
            <p>Div 3</p>
            <p>Segunda linha</p>
        </div>
    </div>
</body>
</html>
