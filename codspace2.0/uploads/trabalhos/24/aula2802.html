<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            
        }
        body {
            background: rgb(107, 129, 161);
         }
        header {
            display: flex;
            height: 60px;
            padding: 10px;
            align-items: center;
            justify-content: space-around;
            background: #d8e2ed;
        }
        header img {
            width: 50px;
        }
        #container {
            gap: 10px;
            display: grid;
            grid-template-columns: 1fr 3fr;
            height: calc(100vh - 80px);
            background: (107, 129, 161);
            grid-template-areas: 
                "menu banner"
                "menu albuns"
                "player player";
                grid-template-rows: 280px 1fr 80px;
                margin-top: 10px;
                padding: 10px;
        }
        .banner {
            grid-area: banner;
            background: #6b97c3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img {
            width: 800px;
            height: 280px;
            object-fit: cover;
            width: 100%;
        }
        
        .menu {
            grid-area: menu;
            background: #001a71;
            padding: 20px;
        }
        .albuns {
            grid-area: albuns;
            gap: 20px;
            display: grid;
            padding: 20px;
            grid-template-columns: repeat(6, 1fr);
            background: #d8e2ed;
            
        }
        .player {
            grid-area: player;
            background: #00519a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album {
            background: rgb(0, 0, 0);
            border-radius: 5px;
            height: 200px;
            transition: 0.3;
            margin-top: 100px;
        }
        .album img {
            object-fit: cover;
            width: 100%;
            height: 200px;
        }
    </style>
</head>
<body>
    <header>
        <img src="spotify-brands-solid-full.svg" alt="logo">
        <input type="search" name="buscar" id="">
        <span>Cauã Franco</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="photo-1511379938547-c1f69419868d.avif" alt="">
        </div>
        <div class="albuns">
            <div class="album">
                <img src="download.jpg" alt="">
            </div>
            <div class="album">
                <img src="download (1).jpg" alt="">
            </div>
            <div class="album">
                <img src="download (2).jpg" alt="">
            </div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="Kayblack - Freestyle.mp3" controls></audio>
        </div>
    </div>
</body>
</html>
