<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>

        }

           body {
             background: rgb(230, 73, 0)
           }

           form {
            background: rgb(255, 255, 255);

            padding: 20px;
           }

           input {

           }

           .formulario{
        display:flex;

           }
           


    </style>
</head>

        <h2>Formulario de cadastro</h2>
    </header>

    <div class="formulario">

           <label for="nascimento">Nascimento</label>
           <input type="date" name="Data de nascimento" id="">

        </form>
    </div>
