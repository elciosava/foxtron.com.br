<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding: 10px;
        }

        header,.menu,.conteudo {
            border: solid 1px black;
        }

        header {
            height: 60px;
            padding: 10px;
        }

        .menu {
            width: 25%;
            margin-right: 10px;
        }

        #conteiner {
            display: flex;
            height: calc(100vh - 80px);
            padding-top: 10px;
        }



        .conteudo {
            width: 75%;
        }
    </style>
</head>

<body>
    <header>
        <h2>site HTML - wireframe</h2>
    </header>

    <div id="conteiner">
        <div class="menu">

        </div>

        <div class="conteudo">

        </div>
    </div>

</body>
</html>
