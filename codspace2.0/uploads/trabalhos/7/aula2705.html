<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI';
            color: white;
            

        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            padding: 10px;

        }

        ul {
            display: flex;
        }

        li {
            list-style: none;
            margin: 5px;
        }

        #inicio {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin-top: -80px;
            padding-top: 10px;
            background-color: aqua;
            background-image: url("https://images.unsplash.com/photo-1614209194864-44ff0f7e9420?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-repeat: no-repeat;
            background-position: center;
        }


        .logo,
        .texto {
            padding: 50px;
            letter-spacing: 10px;
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 2px;
        }

        p {
            letter-spacing: 1px;
            font-size: 1.2rem;
        }
    </style>

</head>

<body>
    <header>
        <nav>
            <ul>
                <li>home</li>
                <li>sobre</li>
                <li>contato</li>

            </ul>
        </nav>
    </header>
    <section id="inicio">





        <div class="logo">
            <h1>Tz sistemas</h1>
        </div>

        <div class="texto">
            <p> A empresa de Tz Sistemas é uma empresa especialisada em criar e desenvolver </p>
            <p>sites e sistemas gerenciais para a sua empresa</p>




        </div>
        </div>

    </section>

</body>

</html>
