<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        header {

            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
        }

        header img {

            width: 50px;






        }




        body {
            background-color: rgb(255, 0, 0);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas:
                "menu banner"
                "menu albuns"
                "player player";

            grid-template-rows: 280px 1fr 80px;
            margin: 10px;
            background-color: rgb(0, 0, 0);
        }

        .menu {
            grid-area: menu;
            background-color: #00d0ff;
            padding: 20px;
        }

        .banner {
            grid-area: banner;
            background-color: #0277fc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;

        }
.banner img{
width: 1500px;
display: flex;
height: 280px;
object-fit: cover;



}





        .albuns {
            padding: 20px;
            display: grid;
            grid-area: albuns;
            background-color: #0026ffc2;
            gap: 30px;
            grid-template-areas: repeat(6, 1fr);
        }




        .player {
            grid-area: player;
            background-color: #0059fd;
            display: flex;
            align-items: center;
            justify-items: center;
        }
.album{
background-color: #0059fd;
border-radius: 5px;
height: 200px;
transition: 0.2s;

}






    </style>
</head>

<body>
    <header>
        <img src="car-solid-full.svg" alt="LOGO">
        <input type="search" name="buscar" id="">
        <span>Thomaz Siqueira</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>

        <div class="banner">
            <img src="premium_photo-1664303403877-7f079e34aec9.avif" alt="">
        </div>

        <div class="albuns">
           <div class="album">thomaz</div>
           <div class="album">lindo</div>
           <div class="album">SIX SEVENN</div>
           <div class="album">VAMO JOGA FF</div>
           <div class="album">OPA</div>
           <div class="album">SEU BOSTA</div>
        </div>

        <div class="player">
            <audio src="Tung Tung Tung Sahur Nela - Leone & Batmao.mp3"controls></audio>
        </div>
    </div>
</body>

</html>
