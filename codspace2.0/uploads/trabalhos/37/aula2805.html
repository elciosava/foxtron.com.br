<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
        }

        header img {
            width: 50px;
        }
        body {
            background: black;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas:
                "menu banner"
                "menu albuns"
                "player player";
            grid-template-rows: 180px 1fr 80px;
            margin-top: 10px;
            

        }

        .menu{
            grid-area: menu;
            background: lightblue;
            padding: 20px;
        }

        .banner {
            grid-area: banner;
            background: orange;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;


        }
        .albuns {
            grid-area: albuns;
            background: green;
            display:grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;

        }

        .player {
            grid-area: player;
            background: orangered;
            display: flex;
            align-items: center;
            justify-content: center;

        }
    </style>


</head>

<body>
    <header>
        <img src="dog-solid-fu.svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>Vera</span>

    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="premium_photo-1679826780214-668c93c0289f.avif" alt="">
        </div>
        <div class="albuns">
            albuns
        </div>
        <div class="player">
            player
        </div>
    </div>
</body>

</html>
