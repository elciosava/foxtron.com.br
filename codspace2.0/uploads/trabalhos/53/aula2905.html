<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
        } 
        
        header img{
            width: 100;
        }
        
        ul{
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 140px);
            padding: 20px;
        
        }
        .div1 {
            grid-row: span 2;
            background-image: url(tanya-barrow-Zdxye8shrP4-unsplash.jpg);
            background-size: cover;
            background-repeat: no-repeat;
        }

         .div2{
            background-image: url(tanya-barrow-27yACkIPN8Y-unsplash.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: -100px;
        }

         .div3{
            background-image: url(bruce-barrow-WzCI6zPypVc-unsplash.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: -100px;
        }

        .linha {
            background-color: rgb(67, 99, 65);
        }

    </style>
</head>
<body>
    <header>
        <img src="" alt="logo">
        <nav>
          <ul>
            <li>INICIO</li>
            <li>SOBRE</li>
            <li>SERVIÇOS</li>
            <li>CONTATO</li>
          </ul>  
        </nav>
    </header>
        <div id="container" >
        <div class="div1">div1</div>
       
        <div class="div2">div2</div>

        <div class="div3">div3</div>
    </div>
    
</body>
</html>
