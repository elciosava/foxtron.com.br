<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
          <style>
            * {
               padding: 0%;
               margin: 0%; 
            }
        .card{
            background-color: rgb(0, 0, 0);
           
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
            grid-template-rows: calc( 100vh - 70px);
        }

        ul {
            display: flex;
            margin-left: 5%;
        }

        li {
            margin: 15px;
            list-style: "⊗";
        }

        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            height: 50px;
            
        }

        input {
            width: 100%;
        }

        form{
            justify-content: center;
            background-color: rgb(243, 10, 10);
           width: 300px;
           padding: 30px;
        }

        .função {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
        
</head>
<body>
    <header>
        <h2>display grid</h2>
        <nav>
            <ul>
                <li>contato</li>
                <li>Rg</li>
                <li>CPF</li>
            </ul>
        </nav>
    </header>
    <div id="container">
        <div class="card"></div>
        <div class="card função">
            <form action="" method="get">

            <label for="nome">Nome</label>
            <input type="text" name="nome" id="">

            <label for="email">CPF</label>
            <input type="text" name="email" id="">

            <label for="cpf">CPF</label>
            <input type="text" name="cpf" id="">

            <button type="submit">Enviar</button>
            </form>
        </div>
    </div> 
    
</body>
</html>
