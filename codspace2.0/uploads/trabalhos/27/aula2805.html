<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background: #4d4f50;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            align-items: center;
            justify-content: space-around;
            background-color: #348cb4;

        }
       header img{
        width: 50px;
       }
        .banner {
            grid-area: banner;
            background-color: #35576f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;

        }

        .banner img{
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .container {
            display: grid;
            height: calc(100vh - 80px);
            padding: 10px;
            background-color: #657787;
            gap: 10px;
            grid-template-columns: 1fr 3fr;
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            border: #657787;
           
        }

        .menu{
            grid-area: menu;
            background-color: #959b9d;
            padding: 20px;
        }

        .albuns{
            grid-area: albuns;
            background: #beb9b6;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6,1fr);
            gap: 20px;
        }

        .player{
            grid-area: player;
            background: #5a7c99;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .album{
            background: #33407a60;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
            margin-top: 100px;
        
        }
        .album img{
            object-fit: cover;
            width: 100%;
            height: 200px;

        }
    </Style>
</head>

<body>
    <header>
        <img src="d-and-d-brands-solid-full (1).svg" alt="Logo">
        <input type="search" name="Buscar" id="">
        <span>Adrian Sokoleki</span>
    </header>
    <div class="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="photo-1650902565793-c2eb262aefbc.avif" alt="">
        </div>
        <div class="albuns">
            <div class="album">
                <img src="ab67616d0000b27302eb05f642de3cbee085d811.jpg" alt="">
            </div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="Vai Tomando Pock Pock(MP3_160K).mp3" controls></audio>
        </div>
    </div>
</body>

</html>
