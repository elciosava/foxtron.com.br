<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: fantasy;
                color: rgb(0, 0, 0);
            }

            header{
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 20px;
                height: 50px;
                background-color: rgb(57, 140, 196);  
                          
            }

            ul {
                display: flex;
                justify-content: center;
                align-items: center;
                list-style: none;
            }
            li {
                margin-left: 25px;
                padding: 30px;
            }

            #container{
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 40px;
                background: rgb(73, 141, 219);
                height: calc(100vh - 90px);
                padding: 30px;
            }

            .div1 {
                grid-row: span 2;
                border-radius: 10px;
                background-image:url("https://images.unsplash.com/photo-1706879349357-f17b91de99a5") ;
                background-size: cover;
                background-repeat: no-repeat;
                


            }

            .div2 {
                background-image:url(https://images.unsplash.com/vector-1764006664802-5a3e06e99115) ;
                background-size: cover;
                background-repeat: no-repeat;
                background-position-y: -230px;
               
                
            }

            .div3{
                background-image:url(https://images.unsplash.com/photo-1608541737042-87a12275d313) ;
                background-size: cover;
                background-repeat: no-repeat;
               background-position-y: -100px;
              
            }


            .linha{
                background-color: rgb(62, 166, 173);
               
            }

       header img{
        height: 30px;
       }

        </style>
</head>

<body>
        <header>
        <img src="playstation-brands-solid-full.svg" alt="Logo">
        <nav>
            <ul>
                <li>Inicio</li>
                <li>Sobre</li>
                <li>Serviços</li>
                <li>Contato</li>
            </ul>
        </nav>
        </header>

        <div id="container">
            
            <div class="div1">
                
                
            </div>

            <div class="div2">
                
               
            </div>

            <div class="div3">
                
               
            </div>

        </div>
</body>
</html>
