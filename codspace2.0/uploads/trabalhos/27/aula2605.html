<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            background-color: rgb(93, 59, 218);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            grid-template-rows: 200px 200px;
        }
    </style>
</head>
<body>
    <header>
        <h2>display grid</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>
    <div id="container">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        </div>
    </div> 
</body>
</html>
