<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    padding-top: 50px;
}
header{
    display: flex;
    height: 50px;
    padding: 10px;
    position: fixed;
    width: 100%;
    background: lightblue;
    top: 0;
}
nav{
    display: flex;
}
ul {
    display: flex;
}
li{
    list-style: none;
    margin: 5px;

}
section{
    height: 100vh; 
scroll-margin-top: 50px;
padding: 10px;

}
#artigo {
    display: flex;
}
#artigo img {
    width: 650px;
    height: 400px;
    object-fit: cover;
}

p { 
    margin-top: 20px;
}


    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">home</a></li>
                <li><a href="#artigo">artigo</a></li>
                <li><a href="#contato">contato</a></li>
            </ul>
        </nav>
    </header>
    <section id="home">
        <h3>home</h3>
    </section>
    <section id="artigo">
        <div class="artigo">
<h3>artigo</h3>

        <p>
          A: tag section no html é usado para fazer a divisão entre sessções de um site, assim como usamos uma div para dividir e separar objetos denro de um elemento pai podemos usar a section como elemento pai de outros objetos.
        </p>
        </div>
        

        <img src="tag section imagem.jpg" alt="#artigo">

    </section>
    <section id="contato">
        <h3>contato</h3>
    </section>
    
</body>
</html>
