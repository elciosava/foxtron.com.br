<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        header{
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
        }
        header img{
            width: 60px;
        }
       
        #container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }
            
       .menu{
        grid-area: menu;
        background: #0895c5;
        padding: 20px;
       }
       .banner{
        grid-area: banner;
        background: #05dced;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        font-weight: bold;  
       }
       .banner img{
        width: 100%;
        height: 280px;
        object-fit: cover;
        
       
       }
       .albuns{
        grid-area: albuns;
        background: #08bfff;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 20px;
       }
       .album{
        background: #0895c5;
        border-radius: 3px;
        height: 200px;
        transition: 0.3s;
       }

       .player{
        grid-area: player;
        background: #00aeef;
        display: flex;
        align-items: center;
        justify-content: center;
       }
       body{
        background: lightblue;
       }



    </style>
</head>
<body>
    <header>
        <img src="shield-cat-solid-full.svg" alt="Logo">
        <input type="search" name="buscar" id="">
        <span>sei la</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            
            <img src="disco.jpg" alt="banner">
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            
        </div>
        <div class="player">
           <div class="player">
                    <audio src="Jorge Vercilo  Homem Aranha.m4a" controls></audio>
                </div>
        </div>


    </div>
</body>
</html>
