<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0%;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background: darkblue;
        }
        
        header img {
            width: 50px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }

        .menu {
            grid-area: menu;
            background: darkblue;
            padding: 20px;
        }

        .banner {
            grid-area: banner;
            background: darkblue;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }

        .banner img {
            width: 800px;
            height: 250px;
            object-fit: cover;
        }

        .albuns {
            grid-area:  albuns;
            background: aqua;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .player {
            grid-area: player;
            background: blueviolet;
            align-items: center;
            justify-content: center;
        }

        .album {
            background: white;
            border-radius: 5px;
            height: 150px;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <header>
     <img src="paw-solid-full (1).svg" alt="logo_do_site">
     <input type="search" name="buscar" id="">
     <span>Henzo Cariolato</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
             
        <div class="banner">
            <img src="https://images.unsplash.com/photo-1733702868662-3c96ce5844b3?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8cG9yc2NoZXxlbnwwfHwwfHx8MA%3D%3D" alt="">
            
        </div>
            
        <div class="albuns">
           <div class="album"></div>
           <div class="album"></div>
           <div class="album"></div>
           <div class="album"></div>
           <div class="album"></div>
           <div class="album"></div>
        </div>
             
         <div class="player">
            <audio src="MC IG - Goodnight Menina 2 (Clipe Oficial) (GR6 Explode) DJ Glenner [EP _NTP__](MP3_160K).mp3" controls></audio>
         </div>
    </div>
</body>
</html>
