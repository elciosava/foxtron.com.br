<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
        }

        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 110px);
            padding: 20px;
        }

        .div1 {
            grid-row: span 2;
            background-image: url("https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8bmlrZSUyMGxvZ298ZW58MHx8MHx8fDA%3D");
            background-size: cover;
            background-repeat: no-repeat;
        }

        .div2 {
            background-image: url("https://images.unsplash.com/photo-1706879349357-f17b91de99a5?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bmlrZSUyMGxvZ298ZW58MHx8MHx8fDA%3D");
            background-size: cover;
            background-repeat: no-repeat; 
            background-position-y: -200px;
        }

        .div3 {
        background-image: url("https://images.unsplash.com/photo-1698326560917-ef25ca57da8d?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8anVzdCUyMGRvJTIwaXR8ZW58MHx8MHx8fDA%3D");
            background-size: cover;
            background-repeat: no-repeat; 
            background-position-y: -200px;
        }
        

        .linha {
            background: white;
        }
    </style>
</head>
<body>
    <header>
        <img src="" alt="logo">
        <nav>
            <ul>
                <li>
                    <ul>INICIO</ul>
                    <ul>SOBRE</ul>
                    <ul>SERVIÇOS</ul>
                    <ul>CONTATO</ul>
            </ul>
        </nav>
    </header>
    <div id="container">
        <diV class="div1">
            <p>Div 1 </p>
            <p>primeira linha</p>
        </diV>
        <diV class="div2">
            <p>Div 2</p>
        </diV>
        <diV class="div3">
            <p>Div 3</p>
        </diV>
    </div>
</body>
</html>
