<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            background: red;
        }

        .posicao {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            
            gap: 10px;
            grid-template-rows: calc(100vh - 70px) ;
        }
        header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
        }

        form {
            width: 300px;
        }
        input {
            width: 100%;
        }

        ul {
            display: flex;

        }

        li{
            display: flex;
            justify-content: center;
            padding: 10px;
            list-style: none;

        }
    </style>
</head>
<body>
    <header>
<h2>display Grid</h2>
 <nav>
    <ul>
        <li>home</li>
        <li>sobre</li>
        <li>contato</li>
    </ul>
 </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card posicao">
        <div class="card">
            <form action="" method="get">
        <label for="nome">nome</label>
        <input type="text" name="" id="">

        <label for="email">email</label>
        <input type="text" name="email" id="">

        <label for="CPF">CPF</label>
        <input type="text" name="cpf" id="">

        <button type="submit">enviar</button>
        </form>
    </div>
        
    </div>
</body>
</html>
