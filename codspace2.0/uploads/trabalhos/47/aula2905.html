<!DOCTYPE html>
<html lang="pr-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
        }



        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;

        }
        .div1{
            grid-row: span 2;
            background-image:url('https://images.unsplash.com/photo-1653046858247-0b861eec1b40?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-repeat: no-repeat;
                        
        }




        .DIV2{
            background-image: url("https://images.unsplash.com/photo-1724166226623-f7e9555a0882?");
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100PX;
        }

        .DIV3{
            background-image: url("https://images.unsplash.com/photo-1616455165195-239de2592faa?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100px;
        }
        .linha, .div1{
            background-color: aqua;
        }
    </style>
</head>

<body>
    <header>
        <img src="" alt="logo">
        <nav>
            <ul>
                <li>inicio</li>
                <li>sobre</li>
                <li>servicos</li>
                <li>contato</li>
            </ul>
        </nav>
    </header>
    <div id="container">

        <div class="div1">
            DIV1
        </div>

        <div class="DIV2">
            DIV2
        </div>

        <div class="DIV3">
            DIV3
        </div>
    </div>
</body>

</html>
