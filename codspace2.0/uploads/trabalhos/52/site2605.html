<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #dfdfdf;
        }

        .coluna {
            background-color: white;
            display: flex;
            padding: 10px;
            justify-content: center;
            align-items: center;
        }

        header {
            background-color: white;
            display: flex;
            padding: 10px;
            justify-content: center;
            align-items: center;
            height: 60px;

        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            gap: 10px;
            grid-template-rows: calc(100vh - 90px);
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h3>CABEÇALHO</h3>
    </header>

    <div id="container">
        <div class="coluna">
            <h3>MENU</h3>
        </div>
        <div class="coluna">
            <h3>CONTEUDO OU OUTRA COISA</h3>

        </div>
        <div class="coluna">
            <h3>OUTRA COISA</h3>

        </div>
    </div>
</body>

</html>
