<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    * {
        margin: 0;
        padding: 0;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        height: 40px;
    }
    ul {
        display: flex;
        justify-content: center;
        align-items: center;
        list-style: none;
    }
    li {
        margin-left: 20px;
    }
    #container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        height: calc(100vh - 130px);
        padding: 20px;
        background-size: cover;
        background-repeat: no-repeat;
    }
    header {
        width: 50px;
    }
    .div3 {
        background-image: url(https://images.unsplash.com/photo-1535905557558-afc4877a26fc?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    }
    .div2 {
        background-image: url(https://images.unsplash.com/photo-1680973543493-6c03e66402fe?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    }
    .div1 {
        grid-row: span 2;
        background-image: url("https://images.unsplash.com/photo-1457369804613-52c61a468e7d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
    }
    .linha{
        background: lightskyblue;
    }
</style>
<body>
    <header>
        <img src="book-solid-full.svg" alt="logo">
        <nav>
            <ul>
                <li>INÍCIO</li>
                <li>SOBRE</li>
                <li>SERVIÇOS</li>
                <li>CONTATO</li>
            </ul>
        </nav>
    </header>
    <div id="container">

        <div class="div1">
             </div>
        <div class="div2">
        </div>
        <div class="div3">
        </div>

        </div>
</body>
</html>
