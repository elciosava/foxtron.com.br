<!DOCTYPE html>
<html lang="pt-br
">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background: lightskyblue;
        }
        header img {
            width: 50px;
        }
        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }
        .menu {
            grid-area: menu;
            background: lightyellow;
            padding: 20px;
        }
        .banner {
            grid-area: banner;
            background: lightpink;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .albuns {
            grid-area: albuns;
            background: lightseagreen;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }
        .player {
            grid-area: player;
            background: darkmagenta;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album {
            background: darkgray;
            border-radius: 5px;
            height: 150px;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://images.unsplash.com/photo-1604716053460-3f66248bf8de?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="logo_do Site">
        <input type="search" name="buscar" id="">
        <span> Vitória De Sá </span>
    </header>
    <div id="container">
        <div class="menu">
            Menu
        </div>
        <div class="banner">
            <img src="https://images.unsplash.com/photo-1618774945391-a8d74e6fa635?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="07 - Máquina do Tempo.mp3" controls></audio>
        </div>
    </div>
</body>
</html>
