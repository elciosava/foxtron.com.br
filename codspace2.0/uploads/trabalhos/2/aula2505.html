<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula2505</title>
    <style>

        body {
            background-color: rgba(22, 189, 22, 0.774);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding-top: 50px;
        }
        header {
            display: flex;
            height: 50px;
            padding: 10px;
            position: fixed;
            width: 100%;
            background: rgb(255, 251, 0);
            top: 0;
        }

        body {
            padding-top: 50px;
        }

        nav {

            display: flex;
        }

        ul {
            display: flex;
        }

        li {
            list-style: none;
            margin: 5px;
        }

        section {
            height: 100vh;
            scroll-margin-top: 50px;
            padding: 20px;
        }

        #Artigo {
            display: flex;
        }

        #Artigo img {
            width: 600px;
            height: 300px   ;
            object-fit: cover;

        }

        p {
            margin-top: 20px;
        }
       
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#Home">Home</a></li>
                <li><a href="#Artigo">Artigo</a></li>
                <li><a href="#Contato">Contato</a></li>
            </ul>
        </nav>
    </header>
    <section id="Home">
        <h3>Home</h3>
    </section>
    
    <section id="Artigo">
        <div class="artigo">
            <h3>Artigo</h3>
        <p>
        A tag Section no html é usada para fazer a divisão de entre sessões de um site, 
        assim como usamos uma div para dividir e separar
        objetos e elementos dentro de um elemento pai, podemos usar a Section como elemento pai de outros objetos.
        </p>
        </div>
        

        <img src="code-explanation-section-tag-in-html.png" alt="">

    </section>

    <section id="Contato">
        <h3>Contato</h3>
    </section>
</body>
</html>
