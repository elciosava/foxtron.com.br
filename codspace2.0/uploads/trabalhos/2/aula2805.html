<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;

        }

        body {
            background-color: antiquewhite;
        }


        header {
            display: flex;
            height: 60px;
            padding: 10px;
            background-color: rgb(233, 196, 152);
            justify-content: space-around;
            align-items: center;



        }

        header img {
            width: 50px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 7px;
            height: calc(100vh - 80px);
            grid-template-areas:
                "menu banner"
                "menu albuns"
                "player player";
            grid-template-rows: 280px 1fr 80px;
            background-color: antiquewhite;
            margin-top: 7px;
        }

        .menu {
            grid-area: menu;
            background-color: bisque;
            padding: 20px;
        }

        .banner {
            grid-area: banner;
            background-color: rgb(252, 180, 92);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }

        .banner img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .albuns {
            grid-area: albuns;
            background-color: rgb(90, 69, 44);
            display: grid;
            padding: 20px;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .player {
            display: flex;
            grid-area: player;
            background-color: rgb(173, 124, 65);
            justify-content: center;
            align-items: center;
        }

        .album {
            background-color: blanchedalmond;
            border-radius: 5px;
            height: 200px;
            transition: 0.4s;
            align-content: center;
            align-items: center;
            margin-top: 120px;
        }

        .album img {
            object-fit: cover;
            width: 100%;
            height: 200px;
        }

        
    </style>
</head>

<body>
    <header>
        <img src="napster-brands-solid-full.svg" alt="Logo">
        <div>

            <input type="search" name="buscar" id="">
            <label for="buscar">🔍︎</label>
        </div>
        <span>Staciak</span>
    </header>

    <div id="container">
        <div class="menu">
            Menu
        </div>
        <div class="banner">
            <img src="tbml37ka9gkg1.jpeg" alt="">
        </div>
        <div class="albuns">
            <div class="album">
                <img src="raquel.jpg" alt="">
            </div>
            <div class="album">
                <img src="expressao ativa.jpg" alt="">
            </div>
            <div class="album">
                <img src="thiagao.jpg" alt="">
            </div>
            <div class="album">
                <img src="raquel.jpg" alt="">
            </div>
            <div class="album">
                <img src="expressao ativa.jpg" alt="">
            </div>
            <div class="album">
                <img src="thiagao.jpg" alt="">
            </div>
        </div>
        <div class="player">
            <audio src="AUD-20240628-WA0122.mp3"controls></audio>
        </div>
    </div>


</body>

</html>
