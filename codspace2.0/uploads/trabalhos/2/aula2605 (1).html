<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0%;
            margin: 0%;
        }



        .card {
            background: rgb(74, 226, 226);



        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
            grid-template-rows: calc(100vh - 90px);
        }

        header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            height: 70px;
            background-color: rgb(58, 126, 120);
        }

        ul {
            display: flex;

        }

        li {

            font-size: large;
            margin: 20px;
            list-style-type: '★ ';

        }

        form {
            width: 300px;
            background-color: beige;
            padding: 15px;

        }

        input {
            width: 100%;

        }

        .posicao {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<body>
    <header>
        <h2>Display Grid</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card posicao">
            <form action="" method="get">

                <label for="name">Nome:</label>
                <input type="text" name="name">

                <label for="name">E-mail:</label>
                <input type="text" name="name">

                <label for="name">Cpf:</label>
                <input type="text" name="name">

                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>



</body>

</html>
