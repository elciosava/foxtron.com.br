<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            
        }
        header img {
            width: 50px;
        }
        body {
            background: rgb(94, 46, 100);
            
        }
        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
                         "menu banner"
                         "menu albuns"
                         "player player"; 
                         grid-template-rows: 380px 1fr 80px;
                         margin-top: 10px;
                         ;
            
        }
        .menu {
            grid-area: menu;
            background: rgb(255, 60, 0);
            padding: 20px;
        }
        .banner {
            grid-area: banner;
            background: rgb(0, 204, 255);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img {
            width: 1500px;
            display: flex;
            height: 380px;
            object-fit: cover;

            
        }


        .albuns {
            grid-area: albuns;
            background: lightgreen;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }
        .player {
            grid-area: player;
            background: rgb(241, 201, 21);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album {
            background: rgb(245, 245, 245);
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
            
        }
        
        
        

    </style>
</head>
<body>
    <header>
        <img src="paw-solid-full.svg" alt="Logo">
        <input type="search" name="buscar" id="">
        <span>Diogo</span>
        


        

    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="premium_photo-1664303403877-7f079e34aec9.avif" alt="">        
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="Tung Tung Tung Sahur Nela - Leone & Batmao.mp3"controls></audio>
        </div>
    </div>

</body>
</html>
