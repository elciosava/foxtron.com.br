<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui,'Segoe UI','Open Sans','Helvetica Neue',sans-serif
        }

        header{
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background: #617374;
        }

        #container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: "menu banner" "menu albuns" "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }

        .menu{
            grid-area: menu;
            background: #213635;
            padding: 20px;
        }

        .banner{
            grid-area: banner;
            background: #3e4b51;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }

        .banner img{
            width: 1450px;
            height: 280px;
            object-fit: cover;
        }
        
        .albuns{
            grid-area: albuns;
            background: #3e4b51;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .player{
            grid-area: player;
            background: #617374;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body{
            background: black;
        }

        header img{
            width: 50px;
        }

        .album{
            background:#617374;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <header>
        <img src="soundcloud-brands-solid-full.svg" alt="logo">
         <input type="search" name="buscar" id="">
         <span>Fernando Javoriski</span>
    </header>
    <div id="container">
        <div class="menu">Menu</div>
        <div class="banner">
            <img src="photo-1594943483795-9e58b77310ed.avif" alt="">
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="Matuê - Like This_ (Bonus Track)(MP3_160K).mp3" controls>Like This</audio>
        </div>
    </div>
</body>
</html>
