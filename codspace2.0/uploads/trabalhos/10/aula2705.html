<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI';
            color: rgb(163, 163, 163);
        }

        header{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            padding: 10px;
        }

        ul{
            display: flex;
        }

        li{
            list-style: none;
            margin: 5px;
        }

        #inicio{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin-top: -80px;
            padding-top: 10px;
            background: rgba(58, 58, 58, 0.623);
            background-image: url(https://images.unsplash.com/photo-1588114410955-e29c67d1f0b9?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-size: 100%;
        }

        .logo, .texto{
            padding: 50px;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 10px;
        }

        p{
            letter-spacing: 1px;
            font-size: 1.2rem;
        }
    </style>
    <body>
        <header>
           <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
           </nav>
        </header>
        <section id="inicio">
            <div class="logo">
                <h1>Mitologia</h1>
            </div>
           
            <div class="texto">
               <p>Existe Mitologia Grega.</p>
               <p>Existe Mitologia Romana.</p>
            </div>
        </section>
           
</body>
</html>
