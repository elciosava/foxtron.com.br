<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
   * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
   }

   body {
    background: rgb(174, 0, 255);
   }

   header{
    display: flex;
    height: 60px;
    padding: 10px;
    justify-content: space-around;
    align-items: center;
    background: rgb(86, 0, 126);
   }

   header img {
       width: 50px;
   }

   #container{
    display: grid;
    grid-template-columns: 1fr 3fr;
    gap: 10px;
    height: calc(100vh - 80px);
    grid-template-areas:
        "menu banner"
        "menu albuns"
        "player player";
        grid-template-rows: 280px 1fr 80px;
        margin-top: 10px;
   }

   .menu {
    grid-area: menu;
    background: rgb(86, 0, 126);
    padding: 20px;
   }

   .banner {
    grid-area: banner;
    background: rgb(86, 0, 126);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: bold;
   }

   .banner img{
    width: 100%;
    height: 280px;
    object-fit: cover;
   }

   .albuns{
    grid-area: albuns;
    background-color: rgb(86, 0, 126);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px;
   }

   .player{
       grid-area: player;
       background: rgb(86, 0, 126);
       display: flex;
       align-items: center;
       justify-content: center;
   }

   .album {
    background: rgb(174, 0, 255);
    border-radius: 5px;
    height: 200px;
    transition: 0.3s;
   }
    </style>
</head>
<body>
    <header>
        <img src="wind-solid-full.svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>Sausen</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="purple-minimalist-music-note-banner-background_2755029.jpg!bw800" alt="">
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
        <audio src="AUD-20160513-WA0001.mp3" controls></audio>
        </div>
    </div>
</body>
</html>
