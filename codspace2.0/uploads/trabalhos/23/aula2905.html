<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

     * {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
     }

     body {
        background: whitesmoke;
     }

     header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        height: 40px; 
     }

     header img {
        width: 50px;
     }

     ul {
         display: flex;
        justify-content: space-between;
        align-items: center;
        list-style:none;
     }

     li{
        margin-left: 20px;
     }

     #container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        height: calc(100vh - 130px);
        padding: 20px;
     }

     .div1 {
        grid-row: span 2;
        background-image: url(https://images.unsplash.com/photo-1779376851024-8b64ff9e256c);
        background-size: cover;
        background-repeat: no-repeat;
     }

     .div2 {
        background-image: url(https://images.unsplash.com/photo-1779485070200-a33a369afe5a);
        background-size: cover;
        background-repeat: no-repeat;
        background-position-y: -100px;
     }

     .div3 {
        background-image: url(https://images.unsplash.com/photo-1778546977770-f6c609485be0);
        background-size: cover;
        background-repeat: no-repeat;
        background-position-y: -100px;
    }

     .linha {
        background: gray;
     }

    </style>
</head>

<body>
    <header>
     <img src="n-solid-full.svg" alt="logo">
     <nav>
        <ul>
            <li>Inicio</li>
            <li>Sobre</li>
            <li>Serviços</li>
            <li>Contato</li>
        </ul>
     </nav>
    </header>
    <div id="container">
        <div class="div1">
            
        </div>
        
        <div class="div2">
            
        </div>
        <div class="div3">
            
        </div>
    </div>
</body>
</html>
