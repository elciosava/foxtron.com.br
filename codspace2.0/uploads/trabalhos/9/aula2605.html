<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .card {
            background: bisque;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 15px;
            grid-template-rows: calc(100vh - 70px);
        }
        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            padding: 10px;
        }

        ul {
            display: flex;
        }

        li {
            margin: 10px;
            list-style: none;
        }
        form {
            height: 145px;
            background: beige;
            width: 300px;
            padding: 20px;
        }
        input{
            width: 100%;
        }
        .tomate{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
    </style>
</head>
<body>
    <header>
        <h2>displey grid</h2>
        <nav>
            <ul>
                <li>home</li>
                <li>sobre</li>
                <li>contato</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="card"></div>
        <div class="card tomate">
            <form action="" method="get">
                <label for="nome">nome</label>
                <input type="text" neme="nome" id="">

                <label for="nome">email</label>
                <input type="text" neme="email" id="">

                <label for="nome">cpf</label>
                <input type="text" neme="cpf" id="">

                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>
</body>
</html>
