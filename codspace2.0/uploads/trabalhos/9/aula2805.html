<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
            background: rgb(223, 190, 250);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas:
                 " menu banner"
                 "menu albuns"
                 "player player";
                 grid-template-rows: 360px 1fr 80px;
                 margin-top: 10px;
        }
        header img {
            width: 50px;
        }
        

        body {
            background-color: black;
        }

        .menu {
            grid-area: menu;
            background: rgb(213, 138, 243);
            padding: 20px;
        }
        .banner {
            grid-area: banner;
            background: rgb(222, 150, 240);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img {
            width: 100%;
            height: 360px;
            object-fit: cover;
        }

        .albuns {
            grid-area: albuns;
            background: rgb(229, 126, 238);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
        }
        .player {
            grid-area: player;
            background-color: rgb(251, 147, 255);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .albun {
            background: rgb(240, 168, 255);
            border-radius: 15px;
            height: 150px;
            transition: 0.3s;
        }
        .albun img {
            width: 100%;
            height: 150px;
            object-fit: fill;
            border-radius: 15px;

        }
    </style>
</head>
<body>
    <header>
        <img src="bolt-solid-full.svg" alt="logo_do_site">
        <input type="search" mame="buscar" id="">
        <span>ruan.f</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="49e9afe7e622acf8bfdd66b807a6d41c.jpg" alt="">
        </div>
        <div class="albuns">
            <div class="albun">
                <img src="alb.avif" alt="">
            </div>
            <div class="albun">
                <img src="OIP.webp" alt="">
            </div>
            <div class="albun">
                <img src="OIP (1).webp" alt="">
            </div>
            <div class="albun">
                <img src="360_F_558319298_QG1ftd7Ey8VMq7vQGJKRQCW7hs8MCPoG.jpg" alt="">
            </div>
            <div class="albun"></div>
            <div class="albun"></div>
            <div class="albun"></div>
            <div class="albun"></div>
        </div>
        <div class="player">
            <audio src="Provavelmente.mp3"controls></audio>
        </div>
    </div>
</body>
</html>
