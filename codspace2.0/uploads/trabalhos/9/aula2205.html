<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        body{
            background: rgb(255, 255, 255);
        }

        form{
            background: rgb(219, 108, 108);
            width: 300px;
            padding: 20px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
        }

        .formulario{
            border: 1px solid rgb(255, 255, 255);
            display: flex;
            justify-content: center;

        }

    </style>
</head>
<body>
    <header>
        <h2>formulario de cadastro</h2>
    </header>

    <div class="formulario">
        <form action="" method="get">
            <label for="nome">nomt:</label>
            <input type="text" name="nome" id="">

            <label for="imail">imail</label>
            <input type="text" name="imail" id="">

            <label for="nacimento">nacimento</label>
            <input type="date" name="nacimento" id="">

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="">

            <button type="submit">Enviar</button>
        </form>


    </div>
</body>
</html>
