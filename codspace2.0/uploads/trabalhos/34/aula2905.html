<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
            background-color: pink;

        }

        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;
        }

        .div1 {
            grid-row: span 2;
            background-image: url("photo-1484291470158-b8f8d608850d.avif");
            background: cover;
            background-repeat: no-repeat;
    
        }

        .div2 {
            background-image: url("photo-1514747975201-4715db583da9.avif");
            background-repeat: cover;
            background-repeat: no-repeat;
        }
        
        .div3 {
            background-image: url("photo-1495546992359-94a48035efca.avif");
            background-repeat: cover;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body>
    <header>
        <img src="" alt="logo">
        <ul>
            <li>INICIO</li>
            <li>SOBRE</li>
            <li>SERVIÇOS</li>
            <li>CONTATO</li>
        </ul>
    </header>

    <div id="container">
        <div class="div1">
        </div>
        <div class="div2">
        </div>
        <div class="div3">
        </div>
    </div>

</body>

</html>
