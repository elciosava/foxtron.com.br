<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }
        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.795);
        }
        ul{
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            
            
        }
        li{
            margin-left: 20px;
            padding: 20px;
        }

        #container{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;
            
        }
        .div1{
            grid-row: span 2;
            background-image: url("https://images.unsplash.com/photo-1778344396688-24d3e8a2a23b?q=80&w=1568&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
           background-size: cover;
            background-repeat: no-repeat;


        }
        .div2{
            background-image:url("https://images.unsplash.com/photo-1778705055353-36a6d65bd86b?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D") ;
             background-size: cover;
            background-repeat: no-repeat;
             

        }
        .div3{
            background-image: url("https://images.unsplash.com/photo-1778092698365-3714f8a4d552?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
              background-size: cover;
            background-repeat: no-repeat;
            


        }
        header img {
            height: 30px;
        }
        

    </style>
</head>
<body>
    <header>
        <img src="windows-brands-solid-full.svg" alt="logo" class="src">
        <nav>
            <ul>
                <li>INICIO</li>
                <li>SOBRE</li>
                <li>SERVIÇOS</li>
                <li>CONTATO</li>
                
                
            </ul>
        </nav>
    </header>
    <div id="container">
        <div class="div1">
            div 1
        </div>
        <div class="div2">
            div 2
        </div>
        <div class="div3">
            div 3
        </div>
        
       
    </div>
</body>
</html>
