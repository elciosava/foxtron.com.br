<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:sans-serif ;
    }
    header{
        display: flex;
        height: 60px;
        padding: 10px;
        justify-content: space-around;
        align-items: center;
        background-color: #707070;
    }
    header img{
        width: 50px;
    }
    body{

        background-color:#616161;

    }
    #container{
        display: grid;
        grid-template-columns: 1fr 3fr;
        gap: 10px;
        height: calc(100vh - 80px);
        background-color:#797979;
        grid-template-areas: 
        "menu banner"
        "menu albuns"
        "player player";
        grid-template-rows: 280px 1fr 80px;
        margin-top: 10px;
        
    }
    .menu{
        grid-area: menu;
        background-color: #707070;
        padding: 20px;
    }
    .banner{
        grid-area: banner;
        background-color:#636363;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        font-weight: bold;
    }
    .banner img{
        width: 100%;
        height: 280px;
        object-fit: cover;
    }

    .albuns{
        grid-area: albuns;
        background-color: rgba(99, 99, 99, 0.774);
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(6,1fr);
        gap: 20px;
    }
    .player{
        grid-area: player;
        background-color: #5c5c5c;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .album{
        background-color: rgb(255, 255, 255);
        border-radius: 5px;
        height: 200px;
        transition: 0.3s;
    }

            
</style>
<body>
    <header>
        <img src="discord-brands-solid-full.svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>Nycolas cristiano</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
           <img src="360_F_131173552_UFUcGIdeVSpWVLAGObVwhUnvZ7SRoy49.jpg" alt="">
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="AUD-20250126-WA0072.mp3"controls></audio>
        </div>
    </div>
</body>
</html>
