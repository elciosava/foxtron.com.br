<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(233, 233, 233);
        }
        *{
            margin: 0;

        }

        }

        }

            object-fit: cover;
        }
        #artigo p {

        }
        p{
            margin-top: 20px;
        }

</head>

   <header>

<p>

   </p>
    </div>
    
    
<img src="hq720.jpg" alt="">

</html>
