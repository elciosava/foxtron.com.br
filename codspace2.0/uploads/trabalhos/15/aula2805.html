<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header {
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;

        }
        header img {
            width: 50px;
        }

        body {
            background: deepskyblue;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas:  
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }

        .menu {
            grid-area: menu;
            background: gray;
            padding: 20px;
        }

        .banner {
            grid-area: banner;
            background: gray;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;

        }

        .banner img {
            width: 800px;
            height: 250px;
            object-fit: cover;


        }

        .albuns {
            grid-area: albuns;
            background: gray;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .player {
            grid-area: player;
            background: gray;
            align-items: center;
            justify-content: center;
        }

        .album {
            background: #d8efed;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }
        


    </style>
</head>
<body>
    <header>
      <img src="bone-solid-full.svg" alt="logo_do_site">
      <input type="search" name="buscar" id="">
      <span>Murilo Roscher</span>

    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="https://th.bing.com/th/id/R.a564e098894537e24a7b662fdbea04ed?rik=IW1IZe9mZIS%2bag&riu=http%3a%2f%2fgetwallpapers.com%2fwallpaper%2ffull%2f6%2f8%2f4%2f176321.jpg&ehk=a%2fA706aHYLfNIfb9aFZhnwIWjjsCP76lXt8AtXrm0To%3d&risl=&pid=ImgRaw&r=0" alt="">
        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        <div class="player">
            <audio src="spotifydown.com - 333.mp3"controls></audio>
        </div>
    </div>
</body>
</html>
