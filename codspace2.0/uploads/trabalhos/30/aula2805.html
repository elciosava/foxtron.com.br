<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header{
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;

        }
        header img{
            width: 50px;

        }
        body{
            background: rgb(80, 80, 80);
        }

        #container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: "menu banner" "menu albuns" "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
            
        }
        .menu{
            grid-area: menu;
            background: #333f48;
            padding: 20px;
        }

        .banner{
            grid-area: banner;
            background: #4d535b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img{
            width: 1450px;
            height: 280px;
            object-fit: cover;
        }
        
        .albuns{
            grid-area: albuns;
            background: #77767c;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6,1fr);
            gap: 20px;

        }
        .player{
            grid-area: player;
            background:#e2e2e2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album{
            background: #494949;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }

        


    </style>
</head>
<body>
    <header>
        <img src="car-solid-full (2).svg" alt="logo">
        <input type="search" name="buscar" id="">
        <span>kososki</span>
    </header>
    <div id="container">
    <div class="menu">
        menu
    </div>
    <div class="banner">
        
        <img src="redcharlie-vQVWIsIBafA-unsplash.jpg" alt="">
    </div>
    <div class="albuns">
        <div class="album"></div>
        <div class="album"></div>
        <div class="album"></div>
        <div class="album"></div>
        <div class="album"></div>
        <div class="album"></div>
    </div>
    <div class="player">
        <audio src="spotifydown.com - O Som.mp3" controls></audio>
    </div>
    </div>
    
</body>
</html>
