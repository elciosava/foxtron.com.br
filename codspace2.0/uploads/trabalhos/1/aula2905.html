<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: #f1f1f1;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
            background-color: #484848;
            color: white;
        }

        header img {
            width: 50px;
        }

        ul {
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
        }

        li {
            margin-left: 20px;
        }

        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            height: calc(100vh - 130px);
            padding: 20px;
        }

        .div1 {
            grid-row: span 2;
            background-image: url("https://images.unsplash.com/photo-1778147356071-c8f5a7287ea6");
            background-size: cover;
            background-repeat: no-repeat;
            border-radius: 5px;
        }

        .div2 {
            background-image: url("https://images.unsplash.com/photo-1778671401408-18430561ab51");
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100px;
            border-radius: 5px;
        }

        .div3 {
            background-image: url("https://images.unsplash.com/photo-1778344396688-24d3e8a2a23b");
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100px;
            border-radius: 5px;
        }

        .linha {
            background: lightcoral;
        }
    </style>
</head>

<body>
    <header>
        <img src="apple-brands-solid-full.svg" alt="logo">
        <nav>
            <ul>
                <li>INICIO</li>
                <li>SOBRE</li>
                <li>SERVIÇOS</li>
                <li>CONTATO</li>
            </ul>
        </nav>
    </header>

    <div id="container">
        <div class="div1">
            
        </div>
        <div class="div2">
            
        </div>
        <div class="div3">
            
        </div>
    </div>
</body>

</html>
