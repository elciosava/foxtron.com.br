<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        header {
            
            display: flex;
            height: 60px;
            padding: 10px;
            justify-content: space-around;
            align-items: center;
          background: rgb(94, 131, 163);

        }

        header img{
         width: 50px;
        }

         #container {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
              "menu banner"
              "menu albuns"
              "player player";
              grid-template-rows:280px 1fr 80px;
              margin: 10px;
              background: rgb(0, 0, 0);

         }


         .menu {
            grid-area: menu;
            background: lightcoral;
            padding: 20px;
         }

         .banner {
            grid-area:banner;
            background: blueviolet;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;

         }

         .banner img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            align-items: center;

         }

         .albuns {
            grid-area: albuns;
            background:rgb(209, 165, 165) ;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
         }
         .player {
            grid-area: player;
            background: lightseagreen;
            display: flex;
            align-items:cneter ;
            justify-content: center;
         }

         .album {
            background: #9cc6cc;
            border-radius:5px ;
            height: 200px;
            transition: 0.3s;
         }
    </style>
</head>
<body>
    <header>
        <img src="torii-gate-solid-full (1).svg"alt="logo_do_site">
        <input type="search" name="buscar"id="">
        <span>maria</span>
    </header>
    <div id="container">
        <div class="menu">
            menu
        </div>
        <div class="banner">
            <img src="photo-1459749411175-04bf5292ceea.avif" alt="">

        </div>
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>

        </div>
        <div class="player">
            <audio src="VINGANÇA -  MC JACARÉ_ MC Luuky _ DJ Andreoli  (Que Eu Voltei pra Rua É Recente) Clipe Oficial(MP3_160K).mp3" controls></audio>

        </div>

    </div>
</body>
</html>
