<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        header{
            display: flex;
            height: 60px;
            padding: 10px;
            align-items: center;
            background-color:#fffb94;
        }
        header img{
            width: 50px;
            height: 200px;
            object-fit: cover;
        }
        #container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            height: calc(100vh - 80px);
            grid-template-areas: 
            "menu banner"
            "menu albuns"
            "player player";
            grid-template-rows: 280px 1fr 80px;
            margin-top: 10px;
        }

        .banner{
            grid-area: banner;
            background-color: #fffb94;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }
        .banner img{
            width: 800px;
            height: 180px;
            object-fit: cover;
        }

        .menu{
            grid-area: menu;
            background: #fffb94;
            padding: 20px;
        }


        .albuns{
            grid-area: albuns;
            background-color:#fffb94;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .player{
            grid-area: player;
            background-color:#fffb94;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album {
            background-color: #203653;
            border-radius: 5px;
            height: 200px;
            transition: 0.3s;
        }

    </style>
</head>
<body>
    <header>
        <img src="bug-solid-full (4).svg" alt="logo_do_site">
        <input type="search" name="buscar" id="">
        <span>isaias</span>
    </header>
        <div id="container">

        <div class="menu">menu</div>
        
        <div class="banner"><img src="supreme.avif" alt=""></div>
      
        <div class="albuns">
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
            <div class="album"></div>
        </div>
        
        <div class="player">player</div>
        <audio src="Imagina esse Cenário - matue.mp3" controls></audio>
    </div>
</body>
</html>
