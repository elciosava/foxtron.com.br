<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }
        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            height: 40px;
        }

        ul{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px;
            list-style: none;
        }


        li{
            margin-left: 20px;
        }

        #container{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 130px);
            padding: 20px;
        }


        .div1{
            grid-row: span 2;
            background-image: url("https://images.unsplash.com/photo-1552832230-c0197dd311b5?q=80&w=1096&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size:cover;
            background-repeat: no-repeat;
        }
        .div2{
            background-image: url("https://images.unsplash.com/photo-1583759604327-f9dcd23499d5?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-repeat: no-repeat;
            background-position-y: -100px;
        }


        .linha3{
            background: lightblue;
        }

        .div3{
            background-image: url("https://images.unsplash.com/photo-1681167816618-2e05b2ab89d6?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: cover;
            background-repeat: no-repeat;
            background-position-y: -100px;
        }

    </style>
</head>
<body>
    <header>
        <img src="" alt="logo">
        <nav>
            <ul>

  
                <li>inicio</li>

                <li>sobre</li>

                <li>serviço</li>

                <li>contato</li>


            </ul>
        </nav>
    </header>

    <div id="container">

        <div class="div1">
            div1
        </div>

        <div class="div2">
            div2
        </div>

        <div class="div3">
            div3
        </div>

    </div>
</body>
</html>
