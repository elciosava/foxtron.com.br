<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player de Vídeo</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .lista {
      width: 250px;
    }

    .lista li {
      list-style: none;
      padding: 10px;
      background: #222;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    .lista li:hover {
      background: #444;
    }

    video {
      width: 720px;
      background: black;
    }
  </style>
</head>
<body>

  <!-- LISTA DE FILMES -->
  <ul class="lista">
    <li data-video="Harry.Potter.e.a.Pedra.Filosofal.2001.1080p.BluRay.5.1.x264.DUAL-WWW.BLUDV.COM.mkv">Harry pota e as pedra</li>
    <li data-video="matrix.mp4">Matrix</li>
    <li data-video="interestelar.mp4">Interestelar</li>
  </ul>

  <!-- PLAYER -->
  <video id="video" controls></video>

  <script>
    const video = document.getElementById("video");
    const filmes = document.querySelectorAll(".lista li");

    filmes.forEach(filme => {
      filme.addEventListener("click", () => {
        const arquivo = filme.getAttribute("data-video");
        video.src = arquivo;
        video.play();
      });
    });

    // Selecionar áudio PT-BR (se existir)
    video.addEventListener("loadedmetadata", () => {
      if (video.audioTracks) {
        for (let i = 0; i < video.audioTracks.length; i++) {
          video.audioTracks[i].enabled =
            video.audioTracks[i].language === "pt";
        }
      }
    });
  </script>

</body>
</html>
