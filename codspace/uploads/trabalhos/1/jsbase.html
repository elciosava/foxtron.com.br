<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>JSBase 2.0 - SENAI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI';
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #003366;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .editor-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: white;
            border: 1px solid #ccc;
            overflow: hidden;
        }

        #editor,
        #highlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 10px;
            box-sizing: border-box;
            white-space: pre;
            word-wrap: normal;
            overflow: auto;
            line-height: 1.5;
        }

        #editor {
            background: transparent;
            color: transparent;
            caret-color: black;
            resize: none;
            z-index: 2;
            outline: none;
            /* Garante que o texto seja idêntico ao do highlight */
            -webkit-text-fill-color: transparent;
        }

        #highlight {
            z-index: 1;
            pointer-events: none;
            background: white;
        }

        .reservada {
            color: #0066ff;
            font-weight: bold;
        }

        .string {
            color: #a31515;
        }

        .numero {
            color: #098658;
        }

        .comentario {
            color: #008000;
            font-style: italic;
        }

        button {
            background: #0055aa;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background: #003f7d;
        }

        #saida {
            margin-top: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            min-height: 100px;
            border: 1px solid #333;
            font-family: monospace;
            white-space: pre-wrap;
            border-radius: 4px;
        }

        .erro-msg {
            color: #f44747;
        }
    </style>
</head>

<body>
    <header>JSBase 2.0 - SENAI</header>
    <div class="container">
        <div class="editor-container">
            <div id="highlight"></div>
            <textarea id="editor" spellcheck="false" placeholder="Digite seu código JSBase aqui..."></textarea>
        </div>
        <button onclick="executar()">Executar Código</button>
        <div id="saida"></div>
    </div>

    <script>
        const editor = document.getElementById("editor");
        const highlight = document.getElementById("highlight");
        const saidaDiv = document.getElementById("saida");

        function transpilar(codigoJSBase) {

            let linhas = codigoJSBase.split('\n');
            let codigoJS = "";
            let pilhaBlocos = [];

            for (let i = 0; i < linhas.length; i++) {

                let linhaOriginal = linhas[i];
                let linha = linhaOriginal.trim();
                let numeroLinha = i + 1;

                // ==========================
                // Ignorar comentários e vazio
                // ==========================
                if (linha.startsWith("//") || linha === "") {
                    codigoJS += linhaOriginal + "\n";
                    continue;
                }

                // ==========================
                // CONTROLE DE BLOCOS (STACK)
                // ==========================

                if (/^se\s+/i.test(linha)) {
                    pilhaBlocos.push({ tipo: "se", linha: numeroLinha });
                }

                if (/^enquanto\s+/i.test(linha)) {
                    pilhaBlocos.push({ tipo: "enquanto", linha: numeroLinha });
                }

                if (/^para\s+/i.test(linha)) {
                    pilhaBlocos.push({ tipo: "para", linha: numeroLinha });
                }

                if (/^fimse$/i.test(linha)) {
                    let topo = pilhaBlocos.pop();
                    if (!topo || topo.tipo !== "se") {
                        throw new Error(`Linha ${numeroLinha}: fimse sem se correspondente.`);
                    }
                }

                if (/^fimenquanto$/i.test(linha)) {
                    let topo = pilhaBlocos.pop();
                    if (!topo || topo.tipo !== "enquanto") {
                        throw new Error(`Linha ${numeroLinha}: fimenquanto sem enquanto correspondente.`);
                    }
                }

                if (/^fimpara$/i.test(linha)) {
                    let topo = pilhaBlocos.pop();
                    if (!topo || topo.tipo !== "para") {
                        throw new Error(`Linha ${numeroLinha}: fimpara sem para correspondente.`);
                    }
                }

                // ==========================
                // VARIÁVEIS TIPADAS
                // ==========================
                let varMatch = linha.match(/^(numero|texto|booleano)\s+(\w+)\s+recebe\s+(.+)$/i);
                if (varMatch) {
                    let valor = traduzirOperadores(varMatch[3]);
                    codigoJS += `let ${varMatch[2]} = ${valor};\n`;
                    continue;
                }

                // ==========================
                // ATRIBUIÇÃO SIMPLES
                // ==========================
                let atribMatch = linha.match(/^(\w+)\s+recebe\s+(.+)$/i);
                if (atribMatch) {
                    let valor = traduzirOperadores(atribMatch[2]);
                    codigoJS += `${atribMatch[1]} = ${valor};\n`;
                    continue;
                }

                // ==========================
                // MOSTRAR
                // ==========================
                let mostrarMatch = linha.match(/^mostrar\s+(.+)$/i);
                if (mostrarMatch) {
                    let partes = mostrarMatch[1].split(/\s*,\s*/);
                    codigoJS += `console.log(${partes.join(", ")});\n`;
                    continue;
                }

                // ==========================
                // ENQUANTO
                // ==========================
                let enquantoMatch = linha.match(/^enquanto\s+(.+)$/i);
                if (enquantoMatch) {
                    codigoJS += `while (${traduzirOperadores(enquantoMatch[1])}) {\n`;
                    continue;
                }

                if (/^fimenquanto$/i.test(linha)) {
                    codigoJS += "}\n";
                    continue;
                }

                // ==========================
                // PARA
                // ==========================
                let paraMatch = linha.match(/^para\s+(\w+)\s+de\s+(.+)\s+ate\s+(.+)$/i);
                if (paraMatch) {

                    let variavel = paraMatch[1];
                    let inicio = traduzirOperadores(paraMatch[2]);
                    let fim = traduzirOperadores(paraMatch[3]);

                    codigoJS += `for (let ${variavel} = ${inicio}; ${variavel} <= ${fim}; ${variavel}++) {\n`;
                    continue;
                }

                if (/^fimpara$/i.test(linha)) {
                    codigoJS += "}\n";
                    continue;
                }

                // ==========================
                // SE / SENAO
                // ==========================
                let seMatch = linha.match(/^se\s+(.+)$/i);
                if (seMatch) {
                    codigoJS += `if (${traduzirOperadores(seMatch[1])}) {\n`;
                    continue;
                }

                if (/^(senão|senao)$/i.test(linha)) {
                    codigoJS += "} else {\n";
                    continue;
                }

                if (/^fimse$/i.test(linha)) {
                    codigoJS += "}\n";
                    continue;
                }

                // ==========================
                // INICIO / FIM (opcional)
                // ==========================
                if (/^(inicio|fim)$/i.test(linha)) {
                    codigoJS += "// " + linha + "\n";
                    continue;
                }

                // ==========================
                // Caso padrão
                // ==========================
                codigoJS += traduzirOperadores(linhaOriginal) + "\n";
            }

            // ==========================
            // VERIFICAÇÃO FINAL DE BLOCOS
            // ==========================
            if (pilhaBlocos.length > 0) {
                let blocoAberto = pilhaBlocos[pilhaBlocos.length - 1];
                throw new Error(
                    `Bloco '${blocoAberto.tipo}' iniciado na linha ${blocoAberto.linha} não foi fechado.`
                );
            }

            return codigoJS;
        }

        function traduzirOperadores(texto) {
            return texto
                .replace(/\bmaior ou igual\b/gi, ">=")
                .replace(/\bmenor ou igual\b/gi, "<=")
                .replace(/\bmaior que\b/gi, ">")
                .replace(/\bmenor que\b/gi, "<")
                .replace(/\bdiferente\b/gi, "!=")
                .replace(/\bigual\b/gi, "==")
                .replace(/\be\b/gi, "&&")
                .replace(/\bou\b/gi, "||");
        }

        function executar() {
            const codigoOriginal = editor.value;
            const codigoTraduzido = transpilar(codigoOriginal);

            let saida = "";
            const originalLog = console.log;
            console.log = function (...args) {
                saida += args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(" ") + "\n";
            };

            try {
                // 2. Aprimoramento do Sistema de Erros (Captura de Linha)
                eval(codigoTraduzido);
            } catch (erro) {
                let linhaErro = "";
                if (erro.stack) {
                    // Tenta extrair a linha do stack trace do eval
                    const stackMatch = erro.stack.match(/<anonymous>:(\d+):/);
                    if (stackMatch) {
                        linhaErro = ` na linha ${stackMatch[1]}`;
                    }
                }

                if (erro instanceof ReferenceError) {
                    let nome = erro.message.split(" ")[0];
                    saida = `<span class="erro-msg">Erro de Referência${linhaErro}: A variável '${nome}' não foi definida.</span>`;
                } else if (erro instanceof SyntaxError) {
                    saida = `<span class="erro-msg">Erro de Sintaxe${linhaErro}: Verifique a escrita do seu código.</span>`;
                } else {
                    saida = `<span class="erro-msg">Erro${linhaErro}: ${erro.message}</span>`;
                }
            }

            console.log = originalLog;
            saidaDiv.innerHTML = saida || "Código executado com sucesso (sem saída).";

            // 5. Segurança: Nota sobre o eval
            console.warn("Nota técnica: O JSBase utiliza eval() para fins educacionais. Em produção, prefira interpretadores seguros.");
        }

        function updateHighlight() {
            let texto = editor.value;

            // Escapar HTML
            texto = texto.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Tokenização simples para evitar destaque dentro de strings/comentários
            let tokens = [];
            let currentIdx = 0;

            // Regex para capturar strings, comentários ou palavras
            // Nota: "maior ou igual" etc devem vir antes de "ou" para não quebrar a regex
            const combinedRegex = /(\/\/.*)|(["'](?:\\.|[^\\])*?["'])|(\b(?:inicio|fim|recebe|se|senao|senão|fimse|enquanto|fimenquanto|mostrar|numero|texto|booleano|maior ou igual|menor ou igual|maior que|menor que|igual|diferente|e|ou)\b)|(\b\d+\b)/gi;

            let result = texto.replace(combinedRegex, function (match, comentario, string, reservada, numero) {
                if (comentario) return `<span class="comentario">${match}</span>`;
                if (string) return `<span class="string">${match}</span>`;
                if (reservada) return `<span class="reservada">${match}</span>`;
                if (numero) return `<span class="numero">${match}</span>`;
                return match;
            });

            highlight.innerHTML = result + "\n";
        }

        editor.addEventListener("input", updateHighlight);

        // 3. Ajuste de Scroll Sincronizado
        editor.addEventListener("scroll", function () {
            highlight.scrollTop = editor.scrollTop;
            highlight.scrollLeft = editor.scrollLeft;
        });

        // Inicializar highlight
        updateHighlight();
    </script>

    <footer>
        <a href="documentacao_jsbase_v2.1.pdf" target="_blank">Ler documentação</a>
    </footer>
</body>

</html>
