<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil - ReUse</title>
  <link rel="stylesheet" href="style2411.css" />
</head>
<body>
<header>
  <h1>♻️ ReUse</h1>
  <nav>
    <a href="index2411.html">Início</a>
    <a href="cadastrar2411.html">Cadastrar Item</a>
    <a href="buscar2411.html">Buscar</a>
    <a href="perfil2411.html" class="ativo">Perfil</a>
    <a href="#" id="logout" style="color: var(--accent);">Sair</a>
  </nav>
  <button id="modo-btn">🌙</button>
</header>

<section class="formulario">
  <h2>Meu Perfil</h2>

  <p><strong>Nome:</strong> <span id="perfil-nome"></span></p>
  <p><strong>Sobrenome:</strong> <span id="perfil-sobrenome"></span></p>
  <p><strong>Email:</strong> <span id="perfil-email"></span></p>
  <p><strong>Endereço:</strong> <span id="perfil-endereco"></span></p>
</section>

<section class="buscar">
  <h2>Meus Itens Cadastrados</h2>
  <div class="grid" id="itens-usuario"></div>
</section>

<footer>
  <p>🌍 ReUse — Reduza, Reutilize, Recicle.</p>
</footer>

<script src="script2411.js"></script>
<script>
  (function preventDuplicateLogout() {
    const nav = document.querySelector('nav');
    const existing = nav && nav.querySelector('[data-logout-added]');
    if (existing) return;
    if (localStorage.getItem('logado')) {
      const sair = document.createElement('a');
      sair.href = '#';
      sair.textContent = 'Sair';
      sair.dataset.logoutAdded = '1';
      sair.style.color = 'var(--accent)';
      sair.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('logado');
        alert('Você saiu da conta!');
        window.location.href = 'index2411.html';
      });
      nav.appendChild(sair);
    }
  })();
</script>
</body>
</html>
