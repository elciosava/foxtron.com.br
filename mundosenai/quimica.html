<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <script src="libs/aframe.min.js?v=2"></script>
    <script src="libs/aframe-ar-nft.js?v=2"></script>
</head>

<body style="margin:0; overflow:hidden;">

    <a-scene embedded renderer="antialias: true; alpha: true" vr-mode-ui="enabled: false" arjs="sourceType: webcam;
          trackingMethod: best;
          sourceWidth:1280;
          sourceHeight:720;
          displayWidth:1280;
          displayHeight:720;
          facingMode: environment;">

        <!-- HIDROGÊNIO -->
        <a-nft id="markerH" type="nft" url="mundosenai/markers/hidrogenio">
            <a-plane src="img/hidrogenio.png" width="3" height="3" rotation="-90 0 0" look-at="[camera]">
            </a-plane>
        </a-nft>

        <!-- OXIGÊNIO -->
        <a-nft id="markerO" type="nft" url="mundosenai/markers/oxigenio">
            <a-plane src="img/oxigenio.png" width="1.2" height="1.2" rotation="-90 0 0" look-at="[camera]">
            </a-plane>
        </a-nft>

        <!-- MOLÉCULA AGUA-->
        <a-entity id="h2o" visible="false">
            <a-plane src="img/agua.png" width="1.5" height="1.5" look-at="[camera]">
            </a-plane>
        </a-entity>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        window.addEventListener("load", () => {

            let hVisible = false;
            let oVisible = false;

            const markerH = document.querySelector("#markerH");
            const markerO = document.querySelector("#markerO");
            const h2o = document.querySelector("#h2o");

            markerH.addEventListener("markerFound", () => hVisible = true);
            markerH.addEventListener("markerLost", () => hVisible = false);

            markerO.addEventListener("markerFound", () => oVisible = true);
            markerO.addEventListener("markerLost", () => oVisible = false);

            setInterval(() => {

                if (hVisible && oVisible) {
                    h2o.setAttribute("visible", true);
                } else {
                    h2o.setAttribute("visible", false);
                }

            }, 100);

        });
    </script>

</body>

</html>
