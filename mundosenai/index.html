<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <title>AR Química - Laboratório Virtual</title>
    <!-- A-Frame e AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
            font-weight: bold;
        }

        .H {
            background: #eee;
            color: #333;
        }

        .O {
            background: #ff4444;
        }

        .C {
            background: #444;
        }

        .N {
            background: #4444ff;
        }
    </style>
</head>

<body>
    <!-- Interface de Usuário para Feedback -->
    <div id="ui">
        <h3 style="margin-top:0">Laboratório AR</h3>
        <div id="status">Aproxime os marcadores...</div>
        <hr>
        <div id="contagem">
            <span class="badge H">H: 0</span>
            <span class="badge O: 0">O: 0</span>
            <span class="badge C: 0">C: 0</span>
            <span class="badge N: 0">N: 0</span>
        </div>
    </div>

    <!-- Cena AR -->
    <!-- Usando detectionMode: mono_and_matrix para suportar Barcodes (0, 1, 2, 3) -->
    <a-scene embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

        <!-- Marcador de Hidrogênio (H) -->
        <a-marker type="pattern" url="assets/H.patt" id="marker-H" class="quim-marker" data-element="H">
            <!-- Adicionamos um objeto invisível dentro de cada marcador para servir de âncora -->
            <a-entity class="ancora"></a-entity>
        </a-marker>

        <a-marker type="pattern" url="assets/O.patt" id="marker-O" class="quim-marker" data-element="O">
            <a-entity class="ancora"></a-entity>
        </a-marker>

        <a-marker type="pattern" url="assets/C.patt" id="marker-C" class="quim-marker" data-element="C">
            <a-entity class="ancora"></a-entity>
        </a-marker>

        <!-- A molécula agora será anexada diretamente ao marcador detectado -->
        <a-entity id="container-molecula" scale="0.5 0.5 0.5"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const elementosAtivos = { H: 0, O: 0, C: 0, N: 0 };
        const container = document.querySelector("#container-molecula");
        const statusTxt = document.querySelector("#status");
        const contagemDiv = document.querySelector("#contagem");

        // Monitorar marcadores
        document.querySelectorAll('.quim-marker').forEach(marker => {
            const el = marker.getAttribute('data-element');

            marker.addEventListener('markerFound', () => {
                console.log("Marcador detectado:", el);
                elementosAtivos[el]++;
                atualizarCena(marker);
            });

            marker.addEventListener('markerLost', () => {
                elementosAtivos[el] = Math.max(0, elementosAtivos[el] - 1);
                atualizarCena();
            });
        });

        function atualizarUI() {
            contagemDiv.innerHTML = `
                <span class="badge H">H: ${elementosAtivos.H}</span>
                <span class="badge O" style="background:#ff4444">O: ${elementosAtivos.O}</span>
                <span class="badge C" style="background:#444">C: ${elementosAtivos.C}</span>
                <span class="badge N" style="background:#4444ff">N: ${elementosAtivos.N}</span>
            `;
        }

        function limparCena() {
            while (container.firstChild) container.removeChild(container.firstChild);
            statusTxt.innerText = "Aproxime os marcadores...";
            statusTxt.style.color = "white";
        }

        function atualizarCena(ancora = null) {
            limparCena();
            atualizarUI();

            let moleculaCriada = false;

            // Se tivermos uma âncora (marcador detectado), movemos o container para ele
            if (ancora) {
                ancora.appendChild(container);
                container.setAttribute("position", "0 0.5 0");
                container.setAttribute("scale", "2 2 2"); // Aumenta o tamanho para facilitar a visualização
            }

            // Lógica de Combinação
            // 1. Metano (CH4)
            if (elementosAtivos.C >= 1 && elementosAtivos.H >= 4) {
                gerarMetano();
                moleculaCriada = true;
            }
            // 2. Amônia (NH3)
            else if (elementosAtivos.N >= 1 && elementosAtivos.H >= 3) {
                gerarAmonia();
                moleculaCriada = true;
            }
            // 3. Dióxido de Carbono (CO2)
            else if (elementosAtivos.C >= 1 && elementosAtivos.O >= 2) {
                gerarCO2();
                moleculaCriada = true;
            }
            // 4. Água (H2O) - Adicionada como bônus
            else if (elementosAtivos.H >= 2 && elementosAtivos.O >= 1) {
                gerarAgua();
                moleculaCriada = true;
            }

            if (!moleculaCriada && (elementosAtivos.H + elementosAtivos.O + elementosAtivos.C + elementosAtivos.N > 0)) {
                statusTxt.innerText = "Combine mais elementos...";
            }
        }

        // Funções de Geometria (Mais performático que innerHTML)
        function criarAtomo(cor, raio, pos) {
            const atomo = document.createElement("a-sphere");
            atomo.setAttribute("color", cor);
            atomo.setAttribute("radius", raio);
            atomo.setAttribute("position", pos);
            return atomo;
        }

        function gerarMetano() {
            statusTxt.innerText = "Molécula: Metano (CH4)";
            statusTxt.style.color = "#00ff00";
            const grupo = document.createElement("a-entity");
            grupo.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear");

            grupo.appendChild(criarAtomo("black", 0.4, "0 0 0")); // C
            grupo.appendChild(criarAtomo("white", 0.2, "0.5 0.5 0.5")); // H
            grupo.appendChild(criarAtomo("white", 0.2, "-0.5 0.5 -0.5")); // H
            grupo.appendChild(criarAtomo("white", 0.2, "0.5 -0.5 -0.5")); // H
            grupo.appendChild(criarAtomo("white", 0.2, "-0.5 -0.5 0.5")); // H

            container.appendChild(grupo);
        }

        function gerarCO2() {
            statusTxt.innerText = "Molécula: Dióxido de Carbono (CO2)";
            statusTxt.style.color = "#00ff00";
            const grupo = document.createElement("a-entity");
            grupo.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear");

            grupo.appendChild(criarAtomo("black", 0.4, "0 0 0")); // C
            grupo.appendChild(criarAtomo("red", 0.35, "0.7 0 0")); // O
            grupo.appendChild(criarAtomo("red", 0.35, "-0.7 0 0")); // O

            container.appendChild(grupo);
        }

        function gerarAgua() {
            statusTxt.innerText = "Molécula: Água (H2O)";
            statusTxt.style.color = "#00ff00";
            const grupo = document.createElement("a-entity");
            grupo.appendChild(criarAtomo("red", 0.4, "0 0 0")); // O
            grupo.appendChild(criarAtomo("white", 0.2, "0.4 0.4 0")); // H
            grupo.appendChild(criarAtomo("white", 0.2, "-0.4 0.4 0")); // H
            container.appendChild(grupo);
        }

        function gerarAmonia() {
            statusTxt.innerText = "Molécula: Amônia (NH3)";
            statusTxt.style.color = "#00ff00";
            const grupo = document.createElement("a-entity");
            grupo.appendChild(criarAtomo("blue", 0.4, "0 0 0")); // N
            grupo.appendChild(criarAtomo("white", 0.2, "0.5 0 0")); // H
            grupo.appendChild(criarAtomo("white", 0.2, "-0.25 0.4 0.4")); // H
            grupo.appendChild(criarAtomo("white", 0.2, "-0.25 0.4 -0.4")); // H
            container.appendChild(grupo);
        }

    </script>
</body>

</html>
